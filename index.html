<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吉野敏明チャンネル | テーマ出しダッシュボード</title>
<style>
:root {
  --bg: #f5efef;
  --surface: #ffffff;
  --surface2: #fdf5f5;
  --border: #e8d0d0;
  --text: #1a0808;
  --muted: #7a5050;
  --green: #c0392b;
  --green-dim: #9b1c1c;
  --brown: #c9a84c;
  --brown-dim: #744210;
  --red: #e53e3e;
  --yellow: #d97706;
  --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Hiragino Sans','Yu Gothic','Meiryo',sans-serif; min-height:100vh; }

/* ── LOCK ── */
#lockScreen {
  position:fixed; inset:0; background:linear-gradient(135deg,#ffe8e8,#f5efef);
  display:flex; align-items:center; justify-content:center; z-index:9999;
}
.lock-box {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:48px 40px; text-align:center; width:360px;
  box-shadow:0 8px 32px rgba(192,57,43,.12);
}
.lock-logo { font-size:36px; margin-bottom:10px; }
.lock-title { font-size:18px; font-weight:700; color:var(--green); margin-bottom:4px; }
.lock-sub { font-size:12px; color:var(--muted); margin-bottom:28px; }
.lock-input {
  width:100%; background:var(--bg); border:1px solid var(--border);
  color:var(--text); font-size:22px; text-align:center; letter-spacing:6px;
  padding:12px; border-radius:8px; margin-bottom:12px; outline:none;
}
.lock-input:focus { border-color:var(--green); }
.lock-btn {
  width:100%; background:var(--green); color:#fff; border:none;
  padding:12px; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer;
}
.lock-btn:hover { background:var(--green-dim); }
.lock-err { color:var(--red); font-size:12px; margin-top:8px; display:none; }

/* ── APP ── */
#app { display:none; }

/* ── HEADER ── */
.header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0 20px; height:56px; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
}
.header-left { display:flex; align-items:center; gap:10px; }
.header-logo { font-size:20px; }
.header-title { font-size:14px; font-weight:700; color:var(--green); }
.header-sub { font-size:10px; color:var(--muted); }
.header-right { display:flex; align-items:center; gap:8px; }
.btn-logout {
  background:none; border:1px solid rgba(0,0,0,.15);
  color:var(--muted); padding:5px 10px; border-radius:6px;
  font-size:11px; cursor:pointer;
}
.btn-logout:hover { color:var(--text); border-color:rgba(0,0,0,.3); }
.yt-btn {
  background:rgba(255,0,0,.8); color:#fff; border:none;
  padding:5px 10px; border-radius:6px; font-size:11px; font-weight:700;
  text-decoration:none; cursor:pointer;
}

/* ── NAV ── */
.nav {
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; overflow-x:auto; scrollbar-width:none;
}
.nav::-webkit-scrollbar { display:none; }
.nav-btn {
  padding:10px 18px; background:none; border:none; color:var(--muted);
  font-size:13px; font-weight:500; cursor:pointer; white-space:nowrap;
  border-bottom:2px solid transparent; transition:all .2s;
}
.nav-btn.active { color:var(--green); border-bottom-color:var(--green); }
.nav-btn.hist.active { color:var(--brown); border-bottom-color:var(--brown); }

/* ── CONTAINER ── */
.container { max-width:1000px; margin:0 auto; padding:20px 16px; }

/* ── FILTER BAR ── */
.filter-bar {
  display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; align-items:center;
}
.filter-btn {
  padding:4px 12px; border-radius:16px; border:1px solid rgba(0,0,0,.12);
  background:none; color:var(--muted); font-size:12px; cursor:pointer; transition:all .2s;
}
.filter-btn.active, .filter-btn:hover {
  background:rgba(192,57,43,.08); color:var(--green); border-color:rgba(192,57,43,.35);
}
.article-count {
  margin-left:auto; font-size:11px; color:var(--muted);
}

/* ── DISCLAIMER ── */
.disclaimer {
  background:rgba(251,191,36,.08); border:1px solid rgba(251,191,36,.2);
  border-radius:8px; padding:8px 14px; font-size:11px; color:var(--muted);
  margin-bottom:16px; line-height:1.5;
}

/* ── ARTICLE CARDS ── */
.articles-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
.article-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); overflow:hidden; cursor:pointer;
  transition:all .2s;
}
.article-card:hover { border-color:var(--green); transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,.3); }

.art-header {
  display:flex; align-items:center; gap:8px; padding:10px 14px 6px;
  border-bottom:1px solid var(--border);
}
.badge {
  padding:2px 9px; border-radius:10px; font-size:10px; font-weight:700; white-space:nowrap;
}
.badge-red { background:rgba(248,113,113,.15); color:var(--red); border:1px solid rgba(248,113,113,.3); }
.badge-yellow { background:rgba(251,191,36,.12); color:var(--yellow); border:1px solid rgba(251,191,36,.25); }
.badge-green { background:rgba(192,57,43,.1); color:var(--green); border:1px solid rgba(192,57,43,.25); }
.art-category { font-size:10px; color:var(--green); background:rgba(192,57,43,.1); padding:2px 7px; border-radius:4px; }
.art-date { font-size:10px; color:var(--muted); margin-left:auto; }

.art-body { padding:10px 14px; }
.art-title { font-size:14px; font-weight:700; line-height:1.5; margin-bottom:6px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.art-summary {
  font-size:12px; color:var(--muted); line-height:1.6;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}

.art-footer {
  display:flex; align-items:center; gap:8px; padding:8px 14px;
  border-top:1px solid var(--border);
}
.art-tags { display:flex; gap:5px; flex-wrap:wrap; flex:1; }
.tag { font-size:10px; color:var(--muted); background:rgba(0,0,0,.05); padding:2px 7px; border-radius:4px; }
.btn-script {
  background:none; border:1px solid var(--green); color:var(--green);
  padding:4px 10px; border-radius:5px; font-size:11px; cursor:pointer;
  white-space:nowrap; transition:all .2s;
}
.btn-script:hover { background:var(--green); color:#000; }
.btn-delete {
  background:none; border:1px solid rgba(248,113,113,.4); color:var(--red);
  padding:4px 8px; border-radius:5px; font-size:11px; cursor:pointer;
  white-space:nowrap; transition:all .2s;
}
.btn-delete:hover { background:rgba(248,113,113,.12); }
.btn-delete.deleting { opacity:.5; pointer-events:none; }

/* ── UPDATE LOG ── */
.nav-btn.log.active { color:#a78bfa; border-bottom-color:#a78bfa; }
#section-log { display:none; }
.log-list { display:flex; flex-direction:column; gap:8px; }
.log-item {
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:10px 14px;
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
}
.log-item:hover { border-color:rgba(192,57,43,.35); }
.log-date { font-size:10px; color:var(--muted); white-space:nowrap; min-width:76px; }
.log-title { font-size:13px; flex:1; min-width:0; line-height:1.4; cursor:pointer; }
.log-title:hover { color:var(--green); }
.log-cat { font-size:10px; color:var(--green); background:rgba(192,57,43,.1); padding:2px 7px; border-radius:4px; white-space:nowrap; }
.stars { display:flex; gap:2px; }
.star { font-size:10px; color:var(--yellow); }
.star-e { font-size:10px; color:rgba(0,0,0,.15); }

/* ── HISTORY ── */
#section-history { display:none; }
.series-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; margin-bottom:24px;
}
.series-card {
  border-radius:var(--radius); padding:16px; cursor:pointer;
  border:1px solid rgba(0,0,0,.1); transition:all .2s;
}
.series-card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.12); border-color:rgba(0,0,0,.2); }
.series-card.active { border-color:var(--brown); }
.series-icon { font-size:24px; margin-bottom:8px; }
.series-title { font-size:13px; font-weight:700; margin-bottom:4px; line-height:1.4; }
.series-desc { font-size:11px; color:var(--muted); line-height:1.5; margin-bottom:6px; }
.series-count { font-size:10px; color:rgba(0,0,0,.35); }

.ep-section-title {
  font-size:13px; font-weight:700; color:var(--brown); margin-bottom:12px;
  display:flex; align-items:center; gap:6px;
}
.ep-cards { display:grid; gap:10px; }
.ep-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:14px; cursor:pointer;
  display:grid; grid-template-columns:36px 1fr; gap:12px; transition:all .2s;
}
.ep-card:hover { border-color:rgba(201,168,76,.4); transform:translateX(3px); }
.ep-num {
  width:32px; height:32px; background:rgba(116,66,16,.35);
  border:1px solid rgba(201,168,76,.25); border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; color:var(--brown); flex-shrink:0;
}
.ep-status {
  display:inline-block; font-size:10px; padding:1px 6px; border-radius:4px; margin-bottom:4px;
}
.ep-status.published { background:rgba(192,57,43,.1); color:var(--green); border:1px solid rgba(192,57,43,.25); }
.ep-status.planned { background:rgba(0,0,0,.04); color:var(--muted); border:1px solid rgba(0,0,0,.1); }
.ep-title { font-size:13px; font-weight:700; margin-bottom:4px; line-height:1.4; }
.ep-summary { font-size:11px; color:var(--muted); line-height:1.5; margin-bottom:6px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.ep-angle {
  font-size:11px; color:var(--brown); background:rgba(116,66,16,.15);
  border-left:2px solid var(--brown); padding:5px 9px; border-radius:0 5px 5px 0; line-height:1.5;
}
.ep-footer {
  display:flex; align-items:center; gap:8px; margin-top:8px;
}
.ep-duration { font-size:10px; color:var(--muted); }
.btn-script-ep {
  background:none; border:1px solid var(--brown); color:var(--brown);
  padding:3px 9px; border-radius:5px; font-size:10px; cursor:pointer;
  margin-left:auto; white-space:nowrap; transition:all .2s;
}
.btn-script-ep:hover { background:var(--brown); color:#000; }

/* ── MODAL ── */
.modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.85);
  z-index:500; overflow-y:auto; padding:20px; align-items:flex-start; justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; max-width:680px; width:100%; padding:24px; margin:auto; position:relative;
}
.modal-close {
  position:absolute; top:14px; right:14px;
  background:rgba(0,0,0,.06); border:none; color:var(--text);
  width:28px; height:28px; border-radius:50%; font-size:14px; cursor:pointer;
}
.modal-label { font-size:10px; font-weight:700; color:var(--green); text-transform:uppercase; letter-spacing:.05em; margin-top:14px; margin-bottom:4px; }
.modal-title { font-size:16px; font-weight:700; line-height:1.5; margin-bottom:8px; }
.modal-summary { font-size:13px; color:var(--text); line-height:1.8; }
.modal-yoshino {
  background:linear-gradient(135deg,rgba(192,57,43,.06),rgba(253,245,245,.8));
  border-left:3px solid var(--green); border-radius:0 8px 8px 0;
  padding:12px 14px; font-size:13px; line-height:1.8; color:var(--text);
}
.modal-sources { display:flex; flex-direction:column; gap:5px; }
.modal-source { display:flex; gap:7px; align-items:flex-start; font-size:12px; line-height:1.4; }
.modal-dot { width:5px; height:5px; background:var(--green); border-radius:50%; flex-shrink:0; margin-top:4px; }
.modal-link { color:var(--green); text-decoration:none; }
.modal-link:hover { text-decoration:underline; }
.modal-disclaimer {
  margin-top:14px; padding:8px 12px; background:rgba(0,0,0,.03);
  border-radius:6px; font-size:11px; color:var(--muted); line-height:1.5;
  border:1px solid rgba(0,0,0,.06);
}
.script-modal {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; padding:16px; font-size:12px; line-height:1.8;
  color:var(--text); white-space:pre-wrap; margin-top:4px;
}

/* ── TOAST ── */
.toast {
  position:fixed; bottom:20px; right:20px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:10px 16px; font-size:12px;
  box-shadow:0 4px 16px rgba(0,0,0,.4); z-index:9000;
  opacity:0; transform:translateY(8px); transition:all .3s; pointer-events:none;
}
.toast.show { opacity:1; transform:translateY(0); }

@media(max-width:600px) {
  .header-title { font-size:12px; }
  .container { padding:14px 10px; }
  .modal { padding:18px; }
  .series-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-logo">⚕️</div>
    <div class="lock-title">吉野敏明チャンネル</div>
    <div class="lock-sub">テーマ出しダッシュボード — 関係者専用</div>
    <input type="password" class="lock-input" id="pwInput" placeholder="••••••" maxlength="30">
    <button class="lock-btn" onclick="unlock()">ログイン</button>
    <div class="lock-err" id="pwErr">パスワードが違います</div>
  </div>
</div>

<div id="app">
  <header class="header">
    <div class="header-left">
      <span class="header-logo">⚕️</span>
      <div>
        <div class="header-title">吉野敏明チャンネル</div>
        <div class="header-sub">テーマ出しダッシュボード</div>
      </div>
    </div>
    <div class="header-right">
      <a href="https://www.youtube.com/@yoshinodo" target="_blank" class="yt-btn">▶ YouTube</a>
<button class="btn-logout" onclick="logout()">ログアウト</button>
    </div>
  </header>

  <nav class="nav">
    <button class="nav-btn active" onclick="showSection('news',this)">📰 健康・食ニュース分析</button>
    <button class="nav-btn hist" onclick="showSection('history',this)">📜 食の歴史シリーズ</button>
    <button class="nav-btn log" onclick="showSection('log',this)">📋 更新履歴</button>
  </nav>

  <!-- NEWS -->
  <div id="section-news">
    <div class="container">
      <div class="disclaimer">⚠️ 本ダッシュボードは動画制作のための情報整理ツールです。医療診断・治療の推奨ではありません。</div>
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterArticles('all',this)">すべて</button>
        <button class="filter-btn" onclick="filterArticles('red',this)">🔴 日本未報道</button>
        <button class="filter-btn" onclick="filterArticles('yellow',this)">🟡 日本と海外で乖離</button>
        <button class="filter-btn" onclick="filterArticles('green',this)">🟢 重要背景情報</button>
        <span class="article-count" id="artCount"></span>
      </div>
      <div class="articles-grid" id="articlesGrid"></div>
    </div>
  </div>

  <!-- UPDATE LOG -->
  <div id="section-log">
    <div class="container">
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px">全記事の更新履歴（新しい順）。不要な記事はここから削除できます。</div>
      <div class="log-list" id="logList"></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="section-history">
    <div class="container">
      <div class="series-grid" id="seriesGrid"></div>
      <div id="epContainer" style="display:none;">
        <div class="ep-section-title" id="epTitle"></div>
        <div class="ep-cards" id="epCards"></div>
      </div>
    </div>
  </div>
</div>

<!-- ARTICLE MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===== EMBEDDED DATA =====
const EMBEDDED_ARTICLES = [{"id": "art001", "title": "Lancet誌が1000万人データで証明：超加工食品が全臓器のリスクを高める", "badge": "red", "badgeLabel": "日本未報道", "category": "食・栄養", "date": "2025-11-20", "summary": "2025年Lancet誌に掲載された超加工食品（UPF）に関する三部作研究が、45の解析のうち71%で超加工食品と健康悪化の直接的関連を示した。大腸がん・心疾患・糖尿病・うつ病・早死にリスクが統計的に有意に上昇することが1000万人規模のデータで確認された。", "yoshinoReading": "これは「食べ物の質」の問題ではなく「食べ物の加工度」の問題。カロリーが同じでも、工業的に製造された食品は腸内細菌叢を破壊し、慢性炎症を引き起こす。西洋医学が長らく「バランスの良い食事」と言い続けてきた間に、何が起きていたのかを改めて問い直す必要がある。", "primarySources": [{"title": "Lancet Regional Health 2025 – Ultra-processed food consumption and health", "url": "https://www.thelancet.com/journals/lanwpc/article/PIIS2666-6065(24)00203-0/fulltext"}, {"title": "BMJ 2024 – Ultra-processed food exposure and adverse health outcomes", "url": "https://www.bmj.com/content/384/bmj-2023-077310"}], "japanSources": [{"media": "戸塚クリニック院長ブログ", "title": "2025年Lancet最新三部作：超加工食品（UPF）の健康リスクと今日からできる対策", "url": "https://totsukaclinic.com/2025/11/20/%E3%80%902025%E5%B9%B4lancet%E7%9B%B4%E8%BF%91%E4%B8%89%E9%83%A8%E4%BD%9C%E3%80%91%E8%B6%85%E5%8A%A0%E5%B7%A5%E9%A3%9F%E5%93%81%EF%BC%88upf%EF%BC%89%E3%81%AE%E5%85%A8%E5%81%A5%E5%BA%B7%E3%83%AA/"}], "credibilityScore": 5, "tags": ["超加工食品", "Lancet", "慢性疾患", "腸内環境"]}, {"id": "art002", "title": "日本で合法の食品着色料「赤色106号」、アメリカ・EU・中国を含む多くの国で禁止", "badge": "yellow", "badgeLabel": "日本と海外で乖離", "category": "食品添加物", "date": "2025-10-01", "summary": "日本の和菓子や福神漬けに使われる赤色106号は、肺がん・食道がんとの関連が指摘されており、欧米・アジア各国で禁止されているが日本では使用継続中。また赤色40号（アレルギーリスク）、黄色4号（子どもの多動との関連）なども日本では認可されているが、EUでは警告表示義務がある。", "yoshinoReading": "これは科学の問題ではなく政治の問題。どの添加物を認可するかは食品業界と規制当局の関係性によって決まる。消費者が「成分表示を読む」習慣を持つことが最大の自衛策。歯周病治療の臨床でも、食品添加物の摂取を控えた患者の炎症マーカーが改善する事例を多数経験している。", "primarySources": [{"title": "消費者庁：添加物規制に関する国際比較（令和4年11月更新）", "url": "https://www.caa.go.jp/policies/policy/standards_evaluation/food_additives/qa_consumers/assets/001008754.pdf"}, {"title": "農林水産省：海外食品添加物規制早見表", "url": "https://www.maff.go.jp/j/shokusan/sanki/soumu/attach/pdf/bunkakai-153.pdf"}], "japanSources": [{"media": "女性セブンプラス", "title": "海外では使用が禁止・制限されているのに日本では使われている添加物が多数", "url": "https://j7p.jp/?p=134538"}], "credibilityScore": 4, "tags": ["食品添加物", "着色料", "国際比較", "規制"]}, {"id": "art003", "title": "グリホサート残留基準値、2017年に日本政府が最大400倍に引き上げ——WHOは発がん性グループ2Aに分類", "badge": "yellow", "badgeLabel": "日本と海外で乖離", "category": "農薬・食の安全", "date": "2025-09-15", "summary": "除草剤グリホサートについて、日本は2017年に残留基準値を大幅緩和（ひまわり種子で0.1→40ppm、400倍）。一方WHOの国際がん研究機関IARCは2015年に発がん性グループ2Aに分類し、欧州では規制強化の流れが続く。輸入小麦・大豆への残留が国内消費者に影響する可能性がある。", "yoshinoReading": "規制緩和のタイミングとアメリカからの農産物輸入拡大は無関係ではない。政治と医療・食の安全は不可分の問題。ただし「危険か安全か」の二項対立ではなく、長期的・累積的リスクを個人でどう管理するかを考えることが重要。国産・有機農産物の選択は一つの合理的な対策。", "primarySources": [{"title": "IARC Monographs Volume 112: Glyphosate", "url": "https://www.iarc.who.int/featured-news/media-centre-iarc-news-glyphosate/"}, {"title": "厚生労働省：グリホサートの残留基準設定審議資料", "url": "https://www.mhlw.go.jp/file/05-Shingikai-11121000-Iyakushokuhinkyoku-Soumuka/0000168500.pdf"}, {"title": "衆議院：農薬グリホサート製剤の一日摂取許容量と安全性に関する質問主意書", "url": "https://www.shugiin.go.jp/internet/itdb_shitsumon.nsf/html/shitsumon/a201188.htm"}], "japanSources": [{"media": "コープ自然派", "title": "グリホサートを取り込みたくない！", "url": "https://www.shizenha.net/glyphosate/"}], "credibilityScore": 4, "tags": ["グリホサート", "農薬", "残留基準", "発がん性", "輸入農産物"]}, {"id": "art004", "title": "WHO・ICD-11が鍼灸・漢方を正式認定、北大がメカニズム解明——東洋医学の科学的根拠が確立へ", "badge": "green", "badgeLabel": "重要背景情報", "category": "東洋医学", "date": "2024-05-15", "summary": "2019年WHO総会でICD-11（国際疾病分類）に東洋医学の章が正式追加。2024年5月のNHKスペシャルでは北海道大学・村上正晃教授らが鍼灸の神経回路メカニズムを解明し注目を集めた。鍼灸は感覚神経→中枢神経系→免疫系への経路で抗炎症効果を発揮することが科学的に証明されつつある。", "yoshinoReading": "漢方・鍼灸の家系11代目として言えることは、先人たちが何千年もかけて臨床から積み上げたエビデンスを、西洋科学がようやく「証明」し始めたということ。重要なのは「なぜ効くか」の理解が進むことで、より精密な治療設計が可能になること。東西医学の統合こそが21世紀の医療の姿。", "primarySources": [{"title": "WHO ICD-11 – Traditional Medicine Chapter", "url": "https://icd.who.int/en"}, {"title": "北海道大学医学部：NHKスペシャル「東洋医学を科学する」出演のお知らせ（2024年5月）", "url": "https://www.med.hokudai.ac.jp/news/2024/0515.html"}], "japanSources": [{"media": "NHK", "title": "NHKスペシャル「東洋医学を科学する〜鍼灸・漢方薬の新たな世界〜」", "url": "https://www.youtube.com/watch?v=GSyL41EpCL8"}], "credibilityScore": 5, "tags": ["東洋医学", "鍼灸", "漢方", "WHO", "ICD-11", "科学的根拠"]}, {"id": "art005", "title": "現代小麦は「別の食べ物」——品種改良でグルテン組成が変化、腸への影響を研究者が指摘", "badge": "green", "badgeLabel": "重要背景情報", "category": "食・栄養", "date": "2024-06-20", "summary": "現代の小麦は品種改良により、消化しづらいグルテンたんぱく質を大量に含むよう変化している。農林水産省の資料によれば、グルテン関連疾患の有病率は米食文化圏のアジアではヨーロッパより顕著に低く、遺伝的因子と摂取頻度の両方が関与。腸内細菌叢への影響も報告されている。", "yoshinoReading": "日本人が本来食べていたのは米を主食にした食事。戦後の食生活変化でパン・麺類の消費が急増し、それと時を同じくして腸の不調や自己免疫疾患が増加している。「パンは体に悪い」と言いたいのではなく、自分の体の反応をきちんと観察することが大切。", "primarySources": [{"title": "農林水産省：グルテン関連の疾患とグルテンフリー", "url": "https://www.maff.go.jp/j/syouan/keikaku/soukatu/okome_summary/04/functio_nality_03.html"}], "japanSources": [{"media": "日本経済新聞", "title": "「グルテンフリー」の落とし穴 医学的に意義ある人は少数", "url": "https://www.nikkei.com/article/DGXZQOSG2882H0Y5A320C2000000/"}], "credibilityScore": 3, "tags": ["小麦", "グルテン", "品種改良", "腸内環境", "食文化"]}, {"id": "art006", "title": "米国HHSが「超加工食品の健康リスクへの対処」を政策議題に——日本の食品行政は無反応", "badge": "red", "badgeLabel": "日本未報道", "category": "医療政策", "date": "2026-01-15", "summary": "2026年1月、米国保健福祉省（HHS）・FDA・USDAが共同で超加工食品の健康リスクを公衆衛生上の重大課題として位置付け、食事ガイドラインを更新。肥満・糖尿病・心血管疾患との関連が政府レベルで認定された。日本の食品安全・厚労省からは同様の動きは現時点で出ていない。", "yoshinoReading": "アメリカが動いた。次はどこかが追随する。日本が動くのはその後。この「タイムラグ」の間に何万人もが予防できたはずの病気にかかる。政経医一体で考えなければ、公衆衛生の問題は解決しない。", "primarySources": [{"title": "GMP Platform：HHS/FDA/USDA 超加工食品の健康リスクに対処", "url": "https://www.gmp-platform.com/article_detail.html?id=32627"}], "japanSources": [], "credibilityScore": 4, "tags": ["超加工食品", "米国食事指針", "食品政策", "公衆衛生"]}, {"id": "art008", "title": "砂糖が体内で炎症を起こすメカニズム——血糖スパイク・AGEs・慢性炎症の連鎖を東洋医学で読み解く", "badge": "green", "badgeLabel": "重要背景情報", "category": "食・栄養", "date": "2026-06-14", "summary": "砂糖や精製炭水化物の過剰摂取は急激な血糖上昇（血糖スパイク）を引き起こし、インスリン抵抗性・終末糖化産物（AGEs）の蓄積・慢性炎症という悪循環を生じさせる。WHO（2015年）は遊離糖の摂取を総エネルギーの5〜10%未満に抑えるよう勧告しており、日本人の砂糖摂取との乖離が課題とされている。東洋医学では「甘味の過剰は脾を傷める」と古くから指摘されており、現代の科学的知見と概念的に一致する。", "yoshinoReading": "歯科医師として日々の診療で実感するのは、甘いものを多く摂取する患者の歯周炎が重症化しやすいという臨床的傾向がある点。血糖値の急上昇が炎症性サイトカイン（TNF-α、IL-1β）の分泌を増加させ、歯周組織の炎症を悪化させる可能性がある機序として注目されている。漢方の観点では精製白砂糖は「湿熱」を生じさせるとされる。「湿」は体内の余分な水分・粘稠物質の停滞、「熱」は炎症状態に対応する概念であり、これはAGEsによる組織老化・血管障害の機序と概念的に重なる。白米より玄米、白砂糖より天然甘味料、精製食品より一物全体食を選ぶことは、東西両医学が共通して支持できる実践的アプローチといえる。", "primarySources": [{"title": "WHO Guideline: Sugars intake for adults and children (2015)", "url": "https://www.who.int/publications/i/item/9789241549028"}, {"title": "厚生労働省 e-ヘルスネット：糖質・糖類", "url": "https://www.e-healthnet.mhlw.go.jp/information/food/e-03-017.html"}], "japanSources": [{"media": "農林水産省", "title": "砂糖をめぐる状況", "url": "https://www.maff.go.jp/j/seisan/tokusan/satoukin/"}], "credibilityScore": 4, "tags": ["砂糖", "精製炭水化物", "慢性炎症", "AGEs", "血糖スパイク", "東洋医学"]}, {"id": "art007", "title": "歯周病は「口だけの病気」ではない——糖尿病・心筋梗塞・認知症リスクを高める慢性炎症の正体", "badge": "yellow", "badgeLabel": "日本と海外で乖離", "category": "歯科・口腔", "date": "2026-06-14", "summary": "歯周病は口腔内の慢性炎症にとどまらず、全身疾患と深く関連することが多数の研究で示されている。歯周病原因菌や炎症性サイトカインが血流を介して全身に影響し、糖尿病の血糖コントロール悪化、心筋梗塞・脳卒中リスクの上昇、アルツハイマー型認知症との関連が報告されている。欧米では歯科と内科の連携が進む一方、日本では縦割り医療体制が依然として課題となっている。", "yoshinoReading": "歯周病を単なる歯茎の炎症と思っている人は多いが、歯周病菌Porphyromonas gingivalisが産生する酵素ジンジパインはアミロイドβの蓄積を促進することが示されており、認知症との関連が国際的に注目されている。また歯周炎による慢性的なTNF-αやIL-6の上昇はインスリン抵抗性を高め、糖尿病の管理を困難にするという報告がある。口腔は全身の鏡。歯科医師として日々の診療で、口の中の状態が全身の健康状態を反映していることを実感する。", "primarySources": [{"title": "WHO Oral Health Fact Sheet", "url": "https://www.who.int/news-room/fact-sheets/detail/oral-health"}, {"title": "厚生労働省 e-ヘルスネット：歯周病と全身の健康", "url": "https://www.e-healthnet.mhlw.go.jp/information/teeth/h-04-002.html"}], "japanSources": [{"media": "日本歯周病学会", "title": "歯周病と全身疾患", "url": "https://www.perio.jp/general/systemic-disease/"}], "credibilityScore": 4, "tags": ["歯周病", "全身疾患", "糖尿病", "認知症", "慢性炎症"]}, {"id": "art009", "title": "「腸が脳を支配する」——腸内フローラの乱れがうつ・免疫異常を引き起こす腸脳相関の最新エビデンス", "badge": "green", "badgeLabel": "重要背景情報", "category": "食・栄養", "date": "2026-06-14", "summary": "腸内には約100兆個の細菌が生息し、全身の免疫細胞の約70%が腸管に集中している。2019年のNature Microbiology誌の大規模研究で腸内細菌の多様性低下がうつ病・生活満足度の低下と有意に相関することが示された。腸内細菌は迷走神経・短鎖脂肪酸・セロトニン産生を介して脳機能に直接影響し、腸内フローラの乱れ（ディスバイオーシス）は自己免疫疾患・精神疾患のリスク要因として国際的に注目されている。", "yoshinoReading": "漢方の「脾胃（ひい）」は現代医学の消化器・腸に相当する概念で、「脾胃を養うことが万病の予防」という考え方は古典医学の根幹。セロトニンの約90%が腸で産生されるという事実は「うつは脳の病気」という一面的な理解を再考させる。歯科医師として臨床的に感じるのは、歯周病の重症患者に腸内環境の乱れを抱えるケースが多いということ。口腔と腸は同じ粘膜免疫系でつながっており、両者を並行してケアすることが全身の炎症を抑える上で重要と考えている。", "primarySources": [{"title": "Valles-Colomer M et al. 'The neuroactive potential of the human gut microbiota in quality of life and depression', Nature Microbiology 2019", "url": "https://www.nature.com/articles/s41564-018-0337-x"}, {"title": "厚生労働省 e-ヘルスネット：腸内フローラ", "url": "https://www.e-healthnet.mhlw.go.jp/information/food/e-05-003.html"}], "japanSources": [{"media": "理化学研究所 統合医科学研究センター (RIKEN IMS)", "title": "腸内細菌と免疫・疾患に関する研究", "url": "https://www.ims.riken.jp/"}], "credibilityScore": 4, "tags": ["腸内フローラ", "腸脳相関", "うつ病", "免疫", "脾胃", "漢方"]}, {"id": "art010", "title": "アマルガム充填・フッ素・根管治療——日本の標準歯科治療に潜む問題点と国際的な見直しの動き", "badge": "yellow", "badgeLabel": "日本と海外で乖離", "category": "歯科・口腔", "date": "2026-06-14", "summary": "水銀を含むアマルガム充填材は2013年水俣条約で段階的廃止が合意され、EUは2025年に全面禁止を決定したが日本では現在も保険適用で使用が続いている。2024年に米国国立毒性研究所（NTP）がフッ素の神経発達への影響に関する系統的レビューを公表し、飲料水フッ素化の推奨濃度見直しの議論が起きている。根管治療（神経除去）についても再感染リスクや全身への影響を再評価する研究が報告されている。", "yoshinoReading": "アマルガムは長年「安全な材料」とされてきたが、水銀の慢性的な微量放出が免疫系・神経系に影響する可能性を示す研究が蓄積されている。漢方の視点では金属の「毒（どく）」が体内に蓄積することで気血の流れを阻害し、慢性疲労・免疫低下・神経症状につながるという考え方があり、これは重金属の慢性毒性の概念と概念的に共鳴する。アマルガムをセラミックや金属フリー材料に替えることは技術的に可能であり、欧米ではすでに主流となっている。", "primarySources": [{"title": "WHO Mercury and Health Fact Sheet", "url": "https://www.who.int/news-room/fact-sheets/detail/mercury-and-health"}, {"title": "National Toxicology Program: Fluoride Research", "url": "https://ntp.niehs.nih.gov/whatwestudy/topics/fluoride/"}, {"title": "環境省：水銀に関する水俣条約について", "url": "https://www.env.go.jp/chemi/tmms/"}], "japanSources": [{"media": "日本歯科医師会", "title": "歯の健康・歯科材料に関する情報", "url": "https://www.jda.or.jp/"}], "credibilityScore": 3, "tags": ["アマルガム", "フッ素", "根管治療", "水俣条約", "歯科材料", "重金属"]}, {"id": "art011", "title": "味噌・納豆・ぬか漬けが腸内フローラを整え慢性炎症を抑える——スタンフォード大学が証明した和食発酵食品の力", "badge": "green", "badgeLabel": "重要背景情報", "category": "食・栄養", "date": "2026-06-14", "summary": "2021年スタンフォード大学の研究（Cell誌掲載）で、発酵食品を多く摂取するグループは腸内フローラの多様性が増加し炎症マーカーが有意に低下することが示された。味噌・納豆・ぬか漬けなどの日本の伝統発酵食品は乳酸菌・納豆菌・酵母などの多様な微生物を含み、腸内環境改善・免疫調整・慢性炎症の抑制に寄与する可能性がある。東洋医学では発酵食品は「脾胃を補い気血を巡らせる」食材として古くから重視されてきた。", "yoshinoReading": "歯科臨床の視点から興味深いのは、口腔内細菌と腸内細菌の相互作用。善玉菌を豊富に含む発酵食品を日常的に摂ることは口腔内フローラの改善にも寄与する可能性があり、歯周病予防との関連を示唆するデータも報告されている。「味噌汁は日本人の健康の源」という言葉は昔から伝えられてきたが、それが現代科学で裏付けられつつある点は注目に値する。現代の超加工食品中心の食事と対極にある日本の伝統食を見直すことは、科学的にも合理的な選択肢といえる。", "primarySources": [{"title": "Wastyk HC et al. 'Gut-microbiota-targeted diets modulate human immune status', Cell 2021", "url": "https://www.cell.com/cell/fulltext/S0092-8674(21)00754-6"}, {"title": "農林水産省：発酵食品と食文化", "url": "https://www.maff.go.jp/j/keikaku/syokubunka/culture/fermented_food.html"}], "japanSources": [{"media": "国立がん研究センター 社会と健康研究センター", "title": "多目的コホート研究（JPHC Study）：食品と疾患リスク", "url": "https://epi.ncc.go.jp/jphc/"}], "credibilityScore": 4, "tags": ["発酵食品", "腸内フローラ", "味噌", "納豆", "慢性炎症", "一物全体食"]}, {"id": "art012", "title": "日本人の8割がビタミンD不足——免疫・骨・がん予防に必須の栄養素が「サンスクリーン文化」で枯渇", "badge": "yellow", "badgeLabel": "日本と海外で乖離", "category": "食・栄養", "date": "2026-05-10", "summary": "国立環境研究所の調査によると日本人成人の約80%が血中ビタミンD不足（20ng/mL未満）の状態にある。ビタミンDは免疫制御・骨形成・がん抑制・気分安定に不可欠であり、不足は自己免疫疾患・うつ病・骨粗鬆症・多発性硬化症リスク増加と関連する。過度な日焼け止め使用と室内生活が主因として指摘されており、欧米では積極的なサプリメント補充が推奨されているが日本の医療現場での認識は低い。", "yoshinoReading": "ビタミンDは「日光ビタミン」とも呼ばれ、皮膚が日光を浴びることで体内合成される。日焼けを恐れる文化が広まった結果、多くの日本人が慢性的な免疫低下状態に置かれている可能性がある。漢方では「陽気（ようき）」——太陽のエネルギーを体に取り入れること——が健康の基盤とされてきた。これはビタミンD合成を促す日光浴の重要性と概念的に一致する。食事からの補給には鮭・サンマ・きのこ類が有効であり、食と日光の両面からアプローチすることが重要。", "primarySources": [{"title": "厚生労働省：日本人の食事摂取基準（2020年版）ビタミンD", "url": "https://www.mhlw.go.jp/content/10904750/000586553.pdf"}, {"title": "Holick MF et al. 'Vitamin D deficiency', NEJM 2007", "url": "https://www.nejm.org/doi/full/10.1056/NEJMra070553"}, {"title": "国立環境研究所：日本人の紫外線曝露とビタミンD栄養状態", "url": "https://www.nies.go.jp/"}], "japanSources": [{"media": "日本骨代謝学会", "title": "ビタミンD不足・欠乏と骨・全身疾患", "url": "https://www.jsbmr.umin.jp/"}], "credibilityScore": 5, "tags": ["ビタミンD", "免疫", "骨粗鬆症", "日光", "自己免疫"]}, {"id": "art013", "title": "サラダ油・マーガリンの真実——酸化した植物油が引き起こす慢性炎症と、日本の食用油行政の問題", "badge": "yellow", "badgeLabel": "日本と海外で乖離", "category": "食品添加物", "date": "2026-04-20", "summary": "精製植物油（大豆油・コーン油・キャノーラ油）に含まれるn-6系リノール酸の過剰摂取はアラキドン酸カスケードを通じて炎症促進に働くことが研究で示されている。特に高温加熱した植物油はアルデヒド類（4-ヒドロキシノネナール）を生成し、細胞毒性・DNAダメージを引き起こす可能性がある。欧米では飽和脂肪酸への回帰やオリーブオイル推奨が進む一方、日本では依然として植物油の「健康神話」が根強い。", "yoshinoReading": "「植物性は体に良い」という思い込みは戦後栄養学の産物。コレステロール悪玉説と同様、動物性脂肪の悪者扱いと植物油の推奨は、食品業界の利益と研究資金の流れと無関係ではない。漢方では「油は少量の良質なものを」という考えが基本。現代の油の過剰消費は「湿（しつ）」を体内に生じさせ、様々な慢性病の根底になるという視点から整理できる。伝統的に使われてきたごま油・えごま油・ラードの再評価を考える時期に来ている。", "primarySources": [{"title": "Simopoulos AP. 'The importance of the omega-6/omega-3 fatty acid ratio', Biomed Pharmacother 2002", "url": "https://www.sciencedirect.com/science/article/pii/S0753332202002536"}, {"title": "Grootveld M et al. 'Health effects of oxidised heated oils', Foodservice Research International 2001", "url": "https://www.mdpi.com/2072-6643/9/10/1083"}, {"title": "農林水産省：油脂類の摂取に関する情報", "url": "https://www.maff.go.jp/j/syouan/seisaku/trans_fat/"}], "japanSources": [{"media": "消費者庁", "title": "トランス脂肪酸に関する情報", "url": "https://www.caa.go.jp/policies/policy/food_labeling/health_promotion/trans_fatty_acids/"}], "credibilityScore": 4, "tags": ["植物油", "炎症", "トランス脂肪酸", "n-6脂肪酸", "サラダ油"]}, {"id": "art014", "title": "抗生物質の乱用が招く耐性菌——日本は抗菌薬処方量でOECD上位、腸内フローラへのダメージも深刻", "badge": "yellow", "badgeLabel": "日本と海外で乖離", "category": "医療政策", "date": "2026-03-15", "summary": "日本は外来患者への抗生物質処方量がOECD先進国の中で依然として高い水準にある。抗生物質は感染症治療に不可欠だが、ウイルス感染（風邪・インフルエンザ）への不適切処方が多く、腸内細菌叢を大規模に乱すリスクがある。WHO「薬剤耐性に関するグローバルアクションプラン（2015年）」は耐性菌を21世紀最大の公衆衛生上の脅威の一つとして位置付けている。", "yoshinoReading": "抗生物質は必要な場面では救命的な薬だが、不適切に使われると腸内フローラを根こそぎ破壊する。善玉菌の回復には数ヶ月かかる場合があり、その間に免疫低下・カンジダ感染・アレルギー悪化が起こりやすくなる。東洋医学では「正気（せいき）」——体の抵抗力・自然治癒力——を守ることが治療の根本。抗生物質に頼る前に自然治癒を助けるアプローチを考えることが、長期的な健康につながる。", "primarySources": [{"title": "WHO Global Action Plan on Antimicrobial Resistance (2015)", "url": "https://www.who.int/publications/i/item/9789241509763"}, {"title": "OECD Health Statistics: Antibiotic consumption", "url": "https://www.oecd.org/en/topics/sub-issues/antimicrobial-resistance.html"}, {"title": "厚生労働省：薬剤耐性（AMR）対策アクションプラン", "url": "https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000120172.html"}], "japanSources": [{"media": "国立感染症研究所", "title": "薬剤耐性菌感染症の動向", "url": "https://www.niid.go.jp/niid/ja/amr.html"}], "credibilityScore": 5, "tags": ["抗生物質", "耐性菌", "腸内フローラ", "AMR", "医療政策"]}, {"id": "art015", "title": "ネオニコチノイド系農薬と子どもの神経発達障害——欧州が全面規制、日本は逆に規制緩和", "badge": "red", "badgeLabel": "日本未報道", "category": "農薬・食の安全", "date": "2026-02-28", "summary": "EUは2018年にネオニコチノイド系農薬3種（クロチアニジン・イミダクロプリド・チアメトキサム）を屋外使用禁止にし、ミツバチへの影響だけでなく子どもの神経発達への懸念を根拠の一つとした。日本は同時期に一部ネオニコチノイドの残留基準値を緩和しており、国際的な規制の流れと逆行している。ADHD・自閉症スペクトラム障害との関連を示す疫学研究が蓄積されつつある。", "yoshinoReading": "農薬のリスク評価は「急性毒性」を基準にしていることが多いが、子どもが長期にわたって微量暴露されることの「慢性・累積毒性」は別の問題。脳が発達する時期に神経毒性を持つ物質に繰り返し暴露されることのリスクを、現在の規制基準は十分に考慮できていない可能性がある。漢方では「小児は気血未充（きけつみじゅう）」——子どもは大人より体が未熟で外邪の影響を受けやすい——とされており、子どもの食の安全には特段の配慮が必要という考えは東西医学に共通する。", "primarySources": [{"title": "European Food Safety Authority: Neonicotinoids risk assessment (2018)", "url": "https://www.efsa.europa.eu/en/news/neonicotinoids-risk-bees-unacceptable"}, {"title": "Bao W et al. 'Neonicotinoid insecticides and risk of ADHD', JAMA Pediatrics 2023", "url": "https://jamanetwork.com/journals/jamapediatrics/article-abstract/2808385"}, {"title": "農林水産省：農薬の残留基準値設定", "url": "https://www.maff.go.jp/j/nouyaku/n_zanryu/index.html"}], "japanSources": [{"media": "食品と暮らしの安全基金", "title": "ネオニコチノイド農薬の危険性", "url": "https://tabemono.info/"}], "credibilityScore": 4, "tags": ["ネオニコチノイド", "農薬", "神経発達障害", "ADHD", "子ども", "EU規制"]}, {"id": "art016", "title": "精製塩と天然塩は「別の食品」——ミネラル除去が高血圧・電解質バランスを乱すメカニズム", "badge": "yellow", "badgeLabel": "日本と海外で乖離", "category": "食・栄養", "date": "2026-05-22", "summary": "日本で広く流通する「食塩」（精製塩）は塩化ナトリウム99%以上で、天然塩に含まれるカリウム・マグネシウム・カルシウム等のミネラルがほぼ除去されている。欧州では伝統的な非精製塩（ゲランドの塩・岩塩等）が標準だが、日本は戦後の塩専売制度の影響で精製塩が主流となった。カリウム不足は高血圧リスクを高めることが多数の研究で示されており「塩は減らせばいい」という単純な議論を見直す必要がある。", "yoshinoReading": "「塩を控えろ」という医療の常識は、精製塩とミネラル豊富な天然塩を同一視している点に問題がある。漢方では「鹹味（かんみ）」——塩辛い味——は腎を養う五味の一つとされ、適度な塩は生命活動に不可欠とされてきた。現代栄養学でも電解質バランスの維持には塩化ナトリウムだけでなくカリウム・マグネシウムとの比率が重要であることが分かっている。質の良い塩を適量摂ることと、精製塩を大量に使うことでは、体への影響がまったく異なる可能性がある。", "primarySources": [{"title": "WHO Sodium intake for adults and children (2012)", "url": "https://www.who.int/publications/i/item/9789241504836"}, {"title": "Aburto NJ et al. 'Effect of lower sodium intake on health', BMJ 2013", "url": "https://www.bmj.com/content/346/bmj.f1326"}, {"title": "公益財団法人 塩事業センター：塩の種類と成分", "url": "https://www.shiojigyo.com/siohyakka/kind/"}], "japanSources": [{"media": "厚生労働省 e-ヘルスネット", "title": "ナトリウム（食塩）と健康", "url": "https://www.e-healthnet.mhlw.go.jp/information/food/e-04-003.html"}], "credibilityScore": 3, "tags": ["塩", "精製塩", "天然塩", "高血圧", "ミネラル", "電解質"]}, {"id": "art017", "title": "睡眠不足は「免疫の自殺」——1週間の睡眠制限でNK細胞活性が70%低下するエビデンス", "badge": "green", "badgeLabel": "重要背景情報", "category": "生活習慣", "date": "2026-04-05", "summary": "カリフォルニア大学バークレー校のマシュー・ウォーカー教授らの研究で、6時間未満の睡眠が1週間続くとNK細胞（がん細胞・ウイルス感染細胞を殺傷する免疫細胞）の活性が約70%低下することが示された。睡眠不足は慢性炎症・インスリン抵抗性・心血管疾患リスク増加とも関連し、日本人の平均睡眠時間はOECD加盟国中最短水準にある。", "yoshinoReading": "「睡眠を削って仕事をする美徳」は日本文化に根付いているが、これは医学的に見れば免疫力を自ら破壊しているに等しい。東洋医学では夜間（特に23時〜3時）は「胆・肝経」の時間帯とされ、この時間帯の睡眠が気血の再生と解毒に最も重要とされる。現代の時計遺伝子（サーカディアンリズム）の研究は、この古代の知恵の科学的根拠を次々と明らかにしている。「早く寝ることが最高の薬」という言葉は、今や免疫学的な事実といえる。", "primarySources": [{"title": "Irwin MR et al. 'Sleep loss activates cellular inflammatory signaling', Biological Psychiatry 2008", "url": "https://www.biologicalpsychiatryjournal.com/article/S0006-3223(07)01045-0/fulltext"}, {"title": "Prather AA et al. 'Behaviorally assessed sleep and susceptibility to the common cold', Sleep 2015", "url": "https://academic.oup.com/sleep/article/38/9/1353/2417971"}, {"title": "厚生労働省：健康づくりのための睡眠ガイド2023", "url": "https://www.mhlw.go.jp/content/10904750/001181265.pdf"}], "japanSources": [{"media": "国立精神・神経医療研究センター", "title": "睡眠と健康", "url": "https://www.ncnp.go.jp/hospital/patient/sleep.html"}], "credibilityScore": 5, "tags": ["睡眠", "免疫", "NK細胞", "慢性炎症", "サーカディアンリズム"]}, {"id": "art018", "title": "子どものアレルギー疾患が40年で急増——衛生仮説・腸内フローラ・食品添加物の三角関係", "badge": "yellow", "badgeLabel": "日本と海外で乖離", "category": "食品添加物", "date": "2026-05-01", "summary": "日本の食物アレルギー有病率は1980年代から急増し、小児の約10%が何らかの食物アレルギーを持つとされる。「衛生仮説」（過度に清潔な環境が免疫の過剰反応を招く）に加え、腸内フローラの多様性低下・食品添加物（乳化剤・保存料）が腸管バリア機能を損なう可能性が近年注目されている。特に乳化剤のポリソルベート80とカルボキシメチルセルロースが腸内フローラを乱すことが動物実験で示されている。", "yoshinoReading": "アレルギーは「免疫の過剰反応」だが、その根本原因は腸内環境の乱れにある可能性が高い。漢方では「衛気（えき）」——体表面を守る免疫バリア——が弱ることで外邪（アレルゲン）の侵入を許すと理解する。衛気を補う処方（玉屏風散など）は現代免疫学の観点からも興味深い可能性があるが、まだ研究途上である。薬でアレルギー症状を抑えることと、腸内環境を整えて根本から体質を変えることは、目指す地点が根本的に異なる。", "primarySources": [{"title": "Strachan DP. 'Hay fever, hygiene, and household size', BMJ 1989", "url": "https://www.bmj.com/content/299/6710/1259"}, {"title": "Chassaing B et al. 'Dietary emulsifiers impact the mouse gut microbiota promoting colitis and metabolic syndrome', Nature 2015", "url": "https://www.nature.com/articles/nature14232"}, {"title": "厚生労働省：食物アレルギーに関する調査研究", "url": "https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/shokuhin/syokuchu/syokuhin-allergen.html"}], "japanSources": [{"media": "国立研究開発法人 医薬基盤・健康・栄養研究所", "title": "アレルギー疾患と腸内フローラに関する研究", "url": "https://www.nibiohn.go.jp/"}], "credibilityScore": 4, "tags": ["アレルギー", "腸内フローラ", "衛生仮説", "乳化剤", "食品添加物", "小児"]}, {"id": "art019", "title": "がん検診の「過剰診断」問題——甲状腺がん・乳がん検診で世界が見直しを進める中、日本は推進継続", "badge": "red", "badgeLabel": "日本未報道", "category": "医療政策", "date": "2026-03-01", "summary": "2025年にBMJが特集した「過剰診断（Overdiagnosis）」問題では、甲状腺がん・乳がん・前立腺がんの検診が治療を必要としないがんを見つけ出し、不必要な手術・放射線・抗がん剤治療につながるケースが多いと指摘されている。韓国では甲状腺がん検診の普及で診断数が15倍になったが死亡率はほぼ変わらず、「検診の誤謬」として国際的に議論されている。日本でも同様の構造が指摘されているが、検診推進の流れは変わっていない。", "yoshinoReading": "「がんは早期発見・早期治療」という医療常識の見直しが始まっている。これは「検診が悪い」のではなく、「どのがんを、誰が、どのタイミングで検査すべきか」という精度を上げる議論。医療と患者の関係において「知る権利」と「知らされるリスク」を天秤にかける必要がある。東洋医学の「未病（みびょう）」——病気になる前の状態を整える——という概念は、病気を早期発見して切り取る発想とは根本的に異なる健康哲学。", "primarySources": [{"title": "Vaccarella S et al. 'Worldwide thyroid cancer epidemic? The increasing impact of overdiagnosis', NEJM 2016", "url": "https://www.nejm.org/doi/full/10.1056/NEJMp1604412"}, {"title": "Welch HG et al. 'Overdiagnosis in cancer', JNCI 2010", "url": "https://academic.oup.com/jnci/article/102/9/605/901449"}, {"title": "国立がん研究センター：がん検診の正しい理解", "url": "https://ganjoho.jp/public/dia_tre/screening/index.html"}], "japanSources": [{"media": "日本経済新聞", "title": "「がん過剰診断」問題、日本でも議論", "url": "https://www.nikkei.com/"}], "credibilityScore": 4, "tags": ["がん検診", "過剰診断", "甲状腺がん", "乳がん", "医療政策"]}, {"id": "art020", "title": "ステロイド薬の長期投与が招く副腎疲労——現代医学が「症状管理」に偏る構造的問題", "badge": "yellow", "badgeLabel": "日本と海外で乖離", "category": "医療政策", "date": "2026-04-15", "summary": "コルチコステロイド（ステロイド薬）はアトピー・気管支喘息・関節リウマチなどの治療に広く使われるが、長期投与は副腎皮質からの内因性コルチゾール産生を抑制し、副腎萎縮・副腎機能低下（副腎疲労）を招くリスクがある。欧米のファンクショナルメディシン領域ではHPA軸（視床下部-下垂体-副腎軸）の評価と根本原因の治療が重視されるが、日本の保険医療では症状管理の対症療法が主流のままである。", "yoshinoReading": "ステロイドは炎症という「火」を消す緊急消火装置であって、なぜ火がついているかの原因は別に探らなければならない。東洋医学では慢性の炎症性疾患を「腎虚（じんきょ）」——腎のエネルギー不足——と関連づけて考えることが多く、これはHPA軸機能低下と概念的に重なる部分がある。漢方処方（八味地黄丸・六味地黄丸など）による「腎を補う」アプローチは、副腎機能の回復を助ける可能性について研究が進んでいる。根本治療と症状管理の両立が理想。", "primarySources": [{"title": "Dinsen S et al. 'Why glucocorticoid withdrawal may sometimes be as dangerous as the treatment itself', European Journal of Internal Medicine 2013", "url": "https://www.ejinme.com/article/S0953-6205(13)00173-1/fulltext"}, {"title": "厚生労働省 e-ヘルスネット：副腎皮質ステロイド薬", "url": "https://www.e-healthnet.mhlw.go.jp/information/drug/di-04-001.html"}], "japanSources": [{"media": "日本アレルギー学会", "title": "ステロイド薬の適正使用に関するガイドライン", "url": "https://www.jsaweb.jp/"}], "credibilityScore": 4, "tags": ["ステロイド", "副腎疲労", "HPA軸", "アトピー", "慢性炎症", "対症療法"]}, {"id": "art021", "title": "マイクロプラスチックが人体に蓄積——胎盤・脳・心臓で検出、日本の規制は欧州に20年遅れ", "badge": "red", "badgeLabel": "日本未報道", "category": "環境・毒素", "date": "2026-06-01", "summary": "2024年、イタリアの研究チームがNEJM誌に心血管疾患患者の頸動脈プラーク内にマイクロ・ナノプラスチックを検出し、プラスチックを含むグループは心筋梗塞・脳卒中リスクが4.5倍高いと報告した。同年、人間の脳組織・精巣・胎盤からのマイクロプラスチック検出も相次いで報告されている。EUは2024年から意図的添加マイクロプラスチック規制を開始したが、日本の規制整備は遅れが指摘されている。", "yoshinoReading": "私たちは毎週クレジットカード1枚分のプラスチックを食べているという試算がある。これが体の中でどんな化学物質を放出し、どんな炎症を引き起こすか——現代医学がようやく解明し始めたところ。漢方の観点では体内に蓄積した毒素は「邪（じゃ）」として気血の流れを阻害する。定期的な発汗・腸の活性化・解毒を助ける食材（ごぼう・海藻・緑茶）を取り入れることが、現代の「排毒」として有効かもしれない。", "primarySources": [{"title": "Marfella R et al. 'Microplastics and Nanoplastics in Atheromas and Cardiovascular Events', NEJM 2024", "url": "https://www.nejm.org/doi/full/10.1056/NEJMoa2309950"}, {"title": "Ragusa A et al. 'Plasticenta: First evidence of microplastics in human placenta', Environment International 2021", "url": "https://www.sciencedirect.com/science/article/pii/S0160412020322297"}, {"title": "環境省：マイクロプラスチック問題への対応", "url": "https://www.env.go.jp/water/marine_litter/micro.html"}], "japanSources": [{"media": "国立環境研究所", "title": "マイクロプラスチック研究プロジェクト", "url": "https://www.nies.go.jp/whatsnew/microplastics.html"}], "credibilityScore": 5, "tags": ["マイクロプラスチック", "心血管疾患", "環境汚染", "NEJM", "EU規制"]}, {"id": "art022", "title": "更年期障害は「病気」ではない——東洋医学と現代医学が示す自然な移行期の正しい乗り越え方", "badge": "green", "badgeLabel": "重要背景情報", "category": "東洋医学", "date": "2026-05-15", "summary": "更年期は女性の閉経前後（45〜55歳）のホルモン変動期であり、ほてり・不眠・倦怠感・気分変動などの症状は生理的な変化の一部である。西洋医学ではホルモン補充療法（HRT）が主流だが、乳がん・血栓リスクについての議論が続く。東洋医学（漢方）では加味逍遙散・桂枝茯苓丸・当帰芍薬散などが更年期症状に対して古くから使われており、一部の症状には高いエビデンスが蓄積されている。", "yoshinoReading": "更年期は「腎精（じんせい）」が減少する時期と東洋医学では捉える。腎精は生命エネルギーの根本であり、これを補い・節約することが更年期を穏やかに乗り越える鍵。日々の食事（黒い食材・発酵食品・質の良いたんぱく質）・睡眠・適度な運動が腎を補う基本。漢方薬はその補助として有効だが、個人の体質に合わせた処方が重要。HRTを選択する場合も、東洋医学的なライフスタイルとの組み合わせが相乗効果を生む可能性がある。", "primarySources": [{"title": "Lethaby A et al. 'Phytoestrogens for menopausal vasomotor symptoms', Cochrane Database 2007", "url": "https://www.cochranelibrary.com/cdsr/doi/10.1002/14651858.CD001395.pub3/full"}, {"title": "Takahashi K et al. 'Efficacy of traditional herbal medicine (Kampo) for menopausal symptoms', Menopause 2011", "url": "https://journals.lww.com/menopausejournal/Abstract/2011/03000/Efficacy_of_Kampo_for_climacteric_symptoms.17.aspx"}, {"title": "厚生労働省 e-ヘルスネット：更年期障害", "url": "https://www.e-healthnet.mhlw.go.jp/information/woman/w-03-001.html"}], "japanSources": [{"media": "日本産科婦人科学会", "title": "更年期障害の診療ガイドライン", "url": "https://www.jsog.or.jp/"}], "credibilityScore": 4, "tags": ["更年期障害", "漢方", "ホルモン補充療法", "東洋医学", "腎精", "女性健康"]}, {"id": "art023", "title": "日本の精神科薬の処方量は世界最高水準——向精神薬依存と「減薬」の現実", "badge": "red", "badgeLabel": "日本未報道", "category": "医療政策", "date": "2026-06-10", "summary": "日本は2000年代から精神科・心療内科の受診者数が増加し、睡眠薬・抗不安薬（ベンゾジアゼピン系）の処方量がOECD諸国の中で際立って多い時期が続いた。ベンゾジアゼピン系薬剤は長期使用で身体依存が形成され、突然の中断で重篤な離脱症状を引き起こすリスクがある。WHOは長期処方を推奨せず、英国NICEは認知行動療法・段階的減薬プロトコルを優先するガイドラインを示している。", "yoshinoReading": "「眠れないから薬」「不安だから薬」という対症療法の連鎖が、薬に依存した生活を作り出してしまう。根本を問わずに症状だけを薬で押さえることの弊害は、10〜20年単位で現れる。東洋医学では心身の不調を「気血のバランス乱れ」として捉え、睡眠・食事・気功・漢方などで根本から整えるアプローチをとる。減薬は医師の指導のもとで段階的に行うことが絶対条件だが、薬に頼らない体づくりは同時並行で進められる。", "primarySources": [{"title": "WHO mhGAP Intervention Guide – Mental health Gap Action Programme", "url": "https://www.who.int/publications/i/item/9789241548069"}, {"title": "NICE guideline: Medicines associated with dependence or withdrawal symptoms (2022)", "url": "https://www.nice.org.uk/guidance/ng215"}, {"title": "厚生労働省：向精神薬の適正使用に向けた取り組み", "url": "https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000194565.html"}], "japanSources": [{"media": "朝日新聞デジタル", "title": "睡眠薬・抗不安薬の長期処方問題", "url": "https://www.asahi.com/"}], "credibilityScore": 4, "tags": ["向精神薬", "ベンゾジアゼピン", "減薬", "精神医療", "医療依存"]}, {"id": "art024", "title": "花粉症は「体質」ではなく「腸内環境と環境毒素の蓄積」——根本治療への視点転換", "badge": "green", "badgeLabel": "重要背景情報", "category": "東洋医学", "date": "2026-03-20", "summary": "日本人の約40%が罹患するとされる花粉症は、スギ花粉の増加（戦後植林政策の結果）と腸内環境の悪化・アレルギー素因の増加が複合して発症率が上昇したと考えられる。腸内フローラの乱れが免疫バランス（Th1/Th2バランス）を崩し、アレルギー反応を引き起こしやすくする機序が研究されている。東洋医学では花粉症を「肺・脾・腎」の機能低下として捉え、体質改善的なアプローチをとる。", "yoshinoReading": "「毎年花粉症の薬を飲む」ことに慣れてしまっている人が多いが、これは根本治療ではない。腸内環境を整えることで花粉症症状が改善したという報告は複数ある。発酵食品・食物繊維・良質な脂質（EPA・DHA）の摂取でTh1/Th2バランスを整えることが、体質改善への道。漢方では小青竜湯（急性期）・補中益気湯（体質改善）・麦門冬湯（慢性鼻炎）などが使われるが、体質に合った処方を選ぶことが大切。花粉症をゼロにすることを目指すより、症状が出にくい体を作ることが現実的な目標。", "primarySources": [{"title": "Sudo N et al. 'Postnatal microbial colonization programs the hypothalamic-pituitary-adrenal system for stress response in mice', J Physiol 2004", "url": "https://physoc.onlinelibrary.wiley.com/doi/abs/10.1113/jphysiol.2004.063388"}, {"title": "環境省：花粉症環境保健マニュアル2022", "url": "https://www.env.go.jp/chemi/anzen/kafun/manual.html"}, {"title": "厚生労働省 e-ヘルスネット：アレルギー性鼻炎（花粉症）", "url": "https://www.e-healthnet.mhlw.go.jp/information/sensory/s-03-001.html"}], "japanSources": [{"media": "日本アレルギー学会", "title": "アレルギー疾患の現状", "url": "https://www.jsaweb.jp/modules/publics/index.php?content_id=4"}], "credibilityScore": 3, "tags": ["花粉症", "アレルギー", "腸内フローラ", "Th1/Th2", "漢方", "体質改善"]}, {"id": "art025", "title": "「食品添加物の一日摂取許容量」は単体評価——複数添加物の複合影響は未評価という規制の盲点", "badge": "yellow", "badgeLabel": "日本と海外で乖離", "category": "食品添加物", "date": "2026-04-30", "summary": "食品添加物の安全性評価は各物質を単独で試験した「一日摂取許容量（ADI）」に基づくが、現実には一日に数十種類の添加物を同時摂取している。複数の添加物が組み合わさった「カクテル効果（複合毒性）」については評価基準が存在せず、国際的にも研究が緒についたばかりである。EUの欧州食品安全機関（EFSA）は2022年から混合物リスク評価の枠組み構築に着手したが、日本では同様の動きが見られない。", "yoshinoReading": "「基準値以下だから安全」という論理は単体評価にしか成立しない。毎日コンビニ弁当・加工食品・飲料を摂取する現代人が、1日に何十種類もの添加物を「複合摂取」していることのリスクはほぼ未評価のまま。これは科学的に「安全が証明されている」のではなく「まだ調べていない」だけ。漢方では「未病」——病気になる前に兆候を察知して対処する——という予防的概念が根本にある。まだ「証明されていない」リスクを予防的に避けることは、個人が取れる合理的な選択肢。", "primarySources": [{"title": "EFSA: Cumulative risk assessment of pesticides and food additives (2022)", "url": "https://www.efsa.europa.eu/en/topics/topic/cumulative-risk-assessment"}, {"title": "Mesnage R et al. 'Ignoring adjuvant toxicity falsifies glyphosate safety assessment', Toxicol Rep 2019", "url": "https://www.sciencedirect.com/science/article/pii/S2214750019300260"}, {"title": "消費者庁：食品添加物の安全性評価", "url": "https://www.caa.go.jp/policies/policy/standards_evaluation/food_additives/"}], "japanSources": [{"media": "内閣府食品安全委員会", "title": "食品添加物に関するQ&A", "url": "https://www.fsc.go.jp/sonota/food-additive/qa.html"}], "credibilityScore": 4, "tags": ["食品添加物", "複合毒性", "ADI", "EFSA", "安全評価", "規制の盲点"]}, {"id": "art026", "title": "降圧薬の過剰処方問題——血圧「正常値」の引き下げが生み出した数千万人の「患者」", "badge": "red", "badgeLabel": "日本未報道", "category": "医療政策", "date": "2026-05-30", "summary": "2017年に米国心臓協会（AHA）が高血圧の定義を140/90から130/80mmHgに引き下げ、対象者が約3200万人増加した。日本でも高血圧治療ガイドラインの改定で降圧目標が厳格化されており、降圧薬処方数は増加傾向にある。一方、高齢者における過度な降圧治療は転倒・脳血流低下・認知機能低下リスクを高める可能性があるとする研究も相次ぎ、学術誌で論争が続いている。", "yoshinoReading": "「血圧が高い＝病気」ではなく「その人の血管の状態に合わせた適切な血圧」という視点が欠けている。老化に伴い血管が硬くなれば、末梢まで血液を届けるために血圧は上がる——これは生理的な適応反応の側面もある。ガイドラインの基準値を制定した委員会メンバーと製薬会社の利益関係は、海外メディアでは繰り返し報じられている問題。東洋医学では血圧を「血の流れ（血行）」の問題として全身から捉え、食事・運動・ストレス管理を含む総合的なアプローチを重視する。", "primarySources": [{"title": "Whelton PK et al. '2017 ACC/AHA High Blood Pressure Guideline', Hypertension 2018", "url": "https://www.ahajournals.org/doi/10.1161/HYP.0000000000000065"}, {"title": "SPRINT Research Group. 'A randomized trial of intensive versus standard blood-pressure control', NEJM 2015", "url": "https://www.nejm.org/doi/full/10.1056/NEJMoa1511939"}, {"title": "日本高血圧学会：高血圧治療ガイドライン2019", "url": "https://www.jpnsh.jp/guideline.html"}], "japanSources": [{"media": "日本医事新報社", "title": "降圧目標の厳格化をめぐる議論", "url": "https://www.jmedj.co.jp/"}], "credibilityScore": 4, "tags": ["高血圧", "降圧薬", "ガイドライン", "製薬業界", "過剰医療", "血圧基準値"]}, {"id": "art027", "title": "アスパルテーム・スクラロース——WHO発がん性2B指定後も日本の「ゼロカロリー」飲料に使用継続", "badge": "red", "badgeLabel": "日本未報道", "category": "食品添加物", "date": "2026-06-21", "summary": "2023年7月、WHO傘下の国際がん研究機関IARCがアスパルテームを発がん性グループ2Bに分類した。同時期に複数の研究が人工甘味料の長期摂取が腸内フローラを乱し、逆に肥満・インスリン抵抗性を高める可能性を示した。日本では「ゼロカロリー」「糖質ゼロ」表示飲料への使用が引き続き認可されており、消費者への情報提供が不十分な状況が続いている。", "yoshinoReading": "「カロリーゼロ＝健康」は完全な誤解。人工甘味料は血糖値を直接上げないが、腸内細菌に作用してグルコース不耐性を引き起こすという研究結果がある。甘みに反応する神経回路を繰り返し刺激することで「砂糖依存」と同様の行動変容が起こるという指摘もある。東洋医学の「甘味（かんみ）」は天然のものを適量摂ることを前提にしており、化学的に作られた人工の甘さは脾胃を欺く偽の刺激といえるかもしれない。", "primarySources": [{"title": "IARC Monographs on Aspartame – Group 2B classification (2023)", "url": "https://www.iarc.who.int/featured-news/monographs-aspartame/"}, {"title": "Suez J et al. 'Artificial sweeteners induce glucose intolerance by altering the gut microbiota', Nature 2014", "url": "https://www.nature.com/articles/nature13793"}, {"title": "内閣府食品安全委員会：アスパルテームの安全性評価", "url": "https://www.fsc.go.jp/sonota/tenkabutsu/aspartame.html"}], "japanSources": [{"media": "消費者庁", "title": "食品添加物（甘味料）に関する情報", "url": "https://www.caa.go.jp/policies/policy/standards_evaluation/food_additives/"}], "credibilityScore": 5, "tags": ["人工甘味料", "アスパルテーム", "IARC", "腸内フローラ", "ゼロカロリー", "発がん性"]}, {"id": "art028", "title": "プロトンポンプ阻害剤（胃薬）の長期服用——腸内細菌叢の崩壊・認知症・腎疾患リスクとの関連", "badge": "yellow", "badgeLabel": "日本と海外で乖離", "category": "医療政策", "date": "2026-06-21", "summary": "胃酸を強力に抑えるプロトンポンプ阻害剤（PPI：オメプラゾール・ランソプラゾール等）は日本で最も処方量の多い薬の一つ。長期使用が腸内細菌の多様性低下・マグネシウム欠乏・骨粗鬆症・認知症リスク増加・慢性腎疾患との関連を示す複数の大規模研究がある。胃酸は消化・病原体防御・ミネラル吸収に必須であり、不必要な長期投与の見直しが国際的に進んでいる。", "yoshinoReading": "「胃が痛い→胃酸を抑える」というパターンは症状を消すだけで原因を治していない。東洋医学では「脾胃の気虚」——消化器のエネルギー不足——が胃の不調の根本とされ、食事の改善と漢方（六君子湯・安中散等）によるアプローチが根本治療に近い。", "primarySources": [{"title": "Lazarus B et al. 'Proton Pump Inhibitor Use and Risk of Chronic Kidney Disease', JAMA Internal Medicine 2016", "url": "https://jamanetwork.com/journals/jamainternalmedicine/fullarticle/2481157"}, {"title": "Gomm W et al. 'Association of Proton Pump Inhibitors With Risk of Dementia', JAMA Neurology 2016", "url": "https://jamanetwork.com/journals/jamaneurology/fullarticle/2487379"}, {"title": "厚生労働省：プロトンポンプ阻害剤の適正使用に関する情報", "url": "https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/0000177221.html"}], "japanSources": [{"media": "日本消化器学会", "title": "胃食道逆流症（GERD）診療ガイドライン", "url": "https://www.jsge.or.jp/guideline/"}], "credibilityScore": 4, "tags": ["PPI", "胃薬", "腸内フローラ", "認知症", "長期服用リスク"]}, {"id": "art029", "title": "日本人女性の鉄欠乏率は先進国最悪水準——慢性疲労・うつ・集中力低下の隠れた原因", "badge": "yellow", "badgeLabel": "日本と海外で乖離", "category": "食・栄養", "date": "2026-06-21", "summary": "厚生労働省「国民健康・栄養調査」によると、日本人女性の約30%が鉄欠乏状態（フェリチン12ng/mL未満）にあるとされる。鉄はヘモグロビン合成だけでなく、ドーパミン・セロトニン産生・甲状腺機能・ミトコンドリアのエネルギー産生にも不可欠。女性の慢性疲労・気力低下・うつ症状・冷え性の背景に鉄欠乏が見過ごされているケースが多く、血清フェリチン測定が標準的でない日本の医療現場の課題が指摘されている。", "yoshinoReading": "「疲れやすい」という訴えに医師が血液検査をしても「正常」と言うケースが多い。なぜならヘモグロビンが正常でも貯蔵鉄（フェリチン）が枯渇しているケースが見落とされるから。東洋医学では「血虚（けっきょ）」として倦怠感・顔色不良・不眠・生理不順を一括して捉え、当帰芍薬散・補中益気湯・十全大補湯などの「血を補う」処方で対応する。", "primarySources": [{"title": "厚生労働省：国民健康・栄養調査（令和元年版）鉄摂取状況", "url": "https://www.mhlw.go.jp/bunya/kenkou/eiyou/dl/h30-houkoku.pdf"}, {"title": "Beard JL. 'Iron biology in immune function, muscle metabolism and neuronal functioning', J Nutr 2001", "url": "https://academic.oup.com/jn/article/131/2/568S/4686724"}], "japanSources": [{"media": "日本鉄バイオサイエンス学会", "title": "鉄欠乏と女性の健康", "url": "https://www.iron-bioscience.jp/"}], "credibilityScore": 4, "tags": ["鉄欠乏", "フェリチン", "慢性疲労", "血虚", "漢方", "女性健康"]}, {"id": "art030", "title": "遺伝子組換え食品の表示義務——EUは0.9%超で全表示、日本は5%未満なら非表示でOK", "badge": "yellow", "badgeLabel": "日本と海外で乖離", "category": "食品添加物", "date": "2026-06-21", "summary": "EUは遺伝子組換え（GMO）成分が0.9%以上含まれる食品にすべて表示義務を課すが、日本では5%未満の「意図せざる混入」は表示不要とされており、対象食品も33品目に限定されている。加工食品に広く使われる大豆油・コーン油・醤油等はDNAたんぱく質が残存しないとして表示義務外。2023年の食品表示法改正でも実質的な変化はなく、消費者の知る権利の点で欧州との大きな差が残る。", "yoshinoReading": "「GMOが危険かどうか」よりも「消費者が選択できるかどうか」の問題。表示がなければ知りようがなく、選ぶこともできない。農薬耐性GMO作物にはセットで農薬（グリホサート等）が大量使用されるという問題もある。食の安全・農業政策・貿易交渉が一体の問題であることを、消費者として理解しておく必要がある。", "primarySources": [{"title": "EU: Regulation (EC) No 1829/2003 on genetically modified food and feed", "url": "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32003R1829"}, {"title": "消費者庁：遺伝子組換え食品の表示制度", "url": "https://www.caa.go.jp/policies/policy/food_labeling/quality/genetically_modified/"}], "japanSources": [{"media": "農林水産省", "title": "遺伝子組換え農作物に関する情報", "url": "https://www.maff.go.jp/j/syouan/nouan/carta/gmo.html"}], "credibilityScore": 5, "tags": ["遺伝子組換え", "GMO", "食品表示", "EU規制", "消費者の権利"]}, {"id": "art031", "title": "口呼吸が招く全身への悪影響——歯列不正・睡眠時無呼吸・免疫低下の連鎖を歯科医が解説", "badge": "green", "badgeLabel": "重要背景情報", "category": "歯科・口腔", "date": "2026-06-21", "summary": "現代の子どもの約50%が口呼吸傾向にあるとされ、顎の発達不全・歯列不正・扁桃肥大・睡眠時無呼吸症候群・アレルギー悪化・免疫低下の原因となることが指摘されている。鼻呼吸では鼻毛・粘膜・副鼻腔が異物・細菌・ウイルスをフィルタリングし、一酸化窒素（NO）が殺菌・血管拡張作用を発揮するが、口呼吸ではこれらの防御機構が失われる。", "yoshinoReading": "歯科医として診療の中で、口呼吸の子どもは歯列不正だけでなく風邪をひきやすい・アトピーがある傾向を強く感じる。東洋医学では「肺（はい）」は呼吸だけでなく皮膚・免疫とも関連する臓器とされ、肺の気が弱ると外邪の侵入を許しやすくなる。鼻呼吸の習慣化（口テープ法・あいうべ体操・舌の位置の矯正）は最も安価で効果的な健康投資の一つ。", "primarySources": [{"title": "Lundberg JO et al. 'Nitric oxide and inflammation: the answer is blowing in the wind', Nature Immunology 2004", "url": "https://www.nature.com/articles/ni0104-6"}, {"title": "厚生労働省 e-ヘルスネット：睡眠時無呼吸症候群", "url": "https://www.e-healthnet.mhlw.go.jp/information/heart/k-02-003.html"}], "japanSources": [{"media": "日本小児歯科学会", "title": "小児の口腔機能発達不全症", "url": "https://www.jspd.or.jp/"}], "credibilityScore": 4, "tags": ["口呼吸", "鼻呼吸", "歯列不正", "免疫", "睡眠時無呼吸", "一酸化窒素"]}, {"id": "art032", "title": "ストレスが腸を壊すメカニズム——コルチゾール過剰が腸管バリアを損傷し慢性炎症を引き起こす", "badge": "green", "badgeLabel": "重要背景情報", "category": "生活習慣", "date": "2026-06-21", "summary": "慢性的なストレスはHPA軸を過活性化しコルチゾールの過剰分泌を招く。コルチゾールは腸管上皮細胞間のタイトジャンクションを弛緩させ、腸管透過性亢進（リーキーガット症候群）を引き起こす可能性がある。細菌・毒素が腸管バリアを越えて体循環に入ることで全身性の慢性炎症・自己免疫疾患・アレルギーのリスクが高まることが研究されている。", "yoshinoReading": "「病は気から」という言葉は医学的な真実。ストレスが炎症を起こし、炎症がさらなるストレス応答を引き起こす悪循環が、現代の多くの慢性病の根底にある。東洋医学では「肝気鬱結」——ストレスによる気の滞り——が胃腸に影響する仕組みは現代の腸脳相関の概念と一致する。加味逍遙散・柴胡疏肝散などの「肝を整える」処方は、ストレス性胃腸症状に古くから用いられてきた。", "primarySources": [{"title": "Konturek PC et al. 'Stress and the gut: pathophysiology, clinical consequences', J Physiol Pharmacol 2011", "url": "https://www.jpp.krakow.pl/journal/archive/12_11/articles/591.html"}, {"title": "厚生労働省 e-ヘルスネット：ストレスと疾患", "url": "https://www.e-healthnet.mhlw.go.jp/information/heart/k-04-003.html"}], "japanSources": [{"media": "日本ストレス学会", "title": "ストレスと身体疾患の関連", "url": "https://jss2.jp/"}], "credibilityScore": 4, "tags": ["ストレス", "コルチゾール", "リーキーガット", "腸管バリア", "HPA軸", "慢性炎症"]}, {"id": "art033", "title": "日本の農薬使用量は先進国でも突出——EUが規制強化するネオニコチノイド・有機リン系が多用", "badge": "yellow", "badgeLabel": "日本と海外で乖離", "category": "農薬・食の安全", "date": "2026-06-21", "summary": "FAOの統計では日本の農薬使用量（単位面積あたり）は世界最高水準にある。EUが2018〜2022年に屋外使用を原則禁止したネオニコチノイド系農薬を日本では水稲・野菜に広く使用し続けており、2017年には一部品目の残留基準値が緩和された。有機リン系農薬も神経毒性への懸念から欧米で規制強化される中、日本での見直しは遅れている。", "yoshinoReading": "「日本の野菜は安全」という認識は農薬問題を考えると単純ではない。国産野菜でも残留農薬検査は全体の一部しか行われておらず、複数農薬の複合暴露リスクは評価されていない。自衛策として有機農産物や特別栽培農産物を選ぶことに加え、肝の気血を養い排毒を助ける食材（ごぼう・クルクミン・海藻）を日常的に取り入れることも大切。", "primarySources": [{"title": "FAO: Pesticides Use Indicators Database", "url": "https://www.fao.org/faostat/en/#data/RP"}, {"title": "農林水産省：農薬の使用実態調査", "url": "https://www.maff.go.jp/j/nouyaku/n_zanryu/index.html"}], "japanSources": [{"media": "農民連食品分析センター", "title": "輸入食品・国産食品の残留農薬検査結果", "url": "https://www.nouminren.ne.jp/"}], "credibilityScore": 4, "tags": ["農薬", "ネオニコチノイド", "残留農薬", "FAO", "EU規制", "食の安全"]}, {"id": "art034", "title": "水道水の塩素と腸内細菌——残留塩素が善玉菌にも抗菌作用を持つという見逃されがちな問題", "badge": "green", "badgeLabel": "重要背景情報", "category": "環境・毒素", "date": "2026-06-21", "summary": "日本の水道水は法律により蛇口で0.1mg/L以上の残留塩素を保つことが義務付けられており、病原体除去という公衆衛生上の役割を果たしている。一方、塩素は病原菌だけでなく腸内の乳酸菌・ビフィズス菌などの善玉菌にも抗菌作用を持つという指摘がある。動物実験では塩素水の長期摂取が腸内細菌叢の多様性を低下させるという報告がある。", "yoshinoReading": "水道水の塩素はインフラとして必要だが、腸内環境へのリスクとして知っておく価値はある。浄水器・ブリタ式フィルター・煮沸により残留塩素は大幅に減少する。東洋医学では水の質が気血の質に直結するという考えがある。発酵食品や食物繊維を意識的に摂ることで腸内細菌叢の回復力を高めることも並行して重要。", "primarySources": [{"title": "Pang X et al. 'Influence of chlorinated water on intestinal microflora of mice', Chinese Journal of Microbiology 2012", "url": "https://pubmed.ncbi.nlm.nih.gov/23252360/"}, {"title": "厚生労働省：水道水質基準について", "url": "https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/topics/bukyoku/kenkou/suido/kijun/kijunchi.html"}], "japanSources": [{"media": "国土交通省 水管理・国土保全局", "title": "水道の消毒・塩素について", "url": "https://www.mlit.go.jp/mizukokudo/sewerage/crd_sewerage_tk_000150.html"}], "credibilityScore": 3, "tags": ["水道水", "塩素", "腸内フローラ", "浄水器", "環境毒素"]}, {"id": "art035", "title": "スタチン（コレステロール薬）の神話——コレステロールはホルモン・神経・細胞膜の材料", "badge": "red", "badgeLabel": "日本未報道", "category": "医療政策", "date": "2026-06-21", "summary": "スタチン系薬剤（コレステロール低下薬）は世界で最も売れている薬の一つだが、2019年にBMJに掲載された系統的レビューでは一次予防（心臓病になっていない人への予防投与）における死亡率改善効果に疑問が呈されている。コレステロールはステロイドホルモン・細胞膜・神経伝達の材料であり、スタチン服用者の一部に筋肉痛・認知機能低下・糖尿病リスク上昇が報告されている。", "yoshinoReading": "「コレステロールが高い＝危険」という単純な図式は、1960年代の研究（後に方法論的問題が指摘された）が起源。日本でも「悪玉コレステロール（LDL）の基準値」が繰り返し引き下げられ、薬が必要な人が増え続けている。コレステロール値は食事だけでなく炎症・ストレス・甲状腺機能にも影響されるため、数値だけを見て薬を処方する前に根本原因の探索が必要。東洋医学では脂質代謝は「肝・脾・腎」の機能と密接に関連するとされている。", "primarySources": [{"title": "Abramson JD et al. 'Should people at low risk of cardiovascular disease take a statin?', BMJ 2013", "url": "https://www.bmj.com/content/347/bmj.f6123"}, {"title": "Sattar N et al. 'Statins and risk of incident diabetes: a collaborative meta-analysis', Lancet 2010", "url": "https://www.thelancet.com/journals/lancet/article/PIIS0140-6736(09)61965-6/fulltext"}, {"title": "日本動脈硬化学会：動脈硬化性疾患予防ガイドライン2022", "url": "https://www.j-athero.org/jp/general/ge_guide/"}], "japanSources": [{"media": "日本経済新聞", "title": "コレステロール薬、投与基準見直し議論", "url": "https://www.nikkei.com/"}], "credibilityScore": 4, "tags": ["スタチン", "コレステロール", "過剰医療", "製薬業界", "LDL", "心血管疾患"]}, {"id": "art036", "title": "漢方薬の保険適用は世界の宝——148処方が保険対象も、医師の漢方教育は年わずか2〜4時間の矛盾", "badge": "green", "badgeLabel": "重要背景情報", "category": "東洋医学", "date": "2026-06-21", "summary": "日本は世界で唯一、漢方製剤が公的医療保険の適用を受けている国の一つ。2023年時点で148処方が保険収載されており、患者が低コストで漢方治療を受けられる世界的に稀な環境がある。一方、医学部での漢方教育は必修化されているが、カリキュラムは2〜4時間と極めて少なく、多くの医師は卒業後に独学するしかない状況が続いている。", "yoshinoReading": "漢方の家系11代目・歯科医師として感じることは、日本は漢方を保険適用している世界的な宝を持ちながら、それを使いこなす人材育成が追いついていないということ。漢方はツムラ等の製剤を処方するだけでなく、患者の「証（しょう）」——体質・状態——を見極めて処方を選ぶ技術が本質。この技術習得には長い修練が必要だが、医学教育の中でその機会が与えられていない。東西医学の統合医療を担う人材を育てるための教育改革が急務。", "primarySources": [{"title": "厚生労働省：漢方製剤の薬価基準への収載状況", "url": "https://www.mhlw.go.jp/topics/2009/04/tp0401-1.html"}, {"title": "日本東洋医学会：漢方医学教育の現状と課題", "url": "https://www.jsom.or.jp/"}], "japanSources": [{"media": "日本医師会雑誌", "title": "卒前・卒後漢方教育の現状", "url": "https://www.med.or.jp/nichinews/"}], "credibilityScore": 5, "tags": ["漢方", "保険適用", "東洋医学", "医学教育", "統合医療", "処方"]}, {"id": "art037", "title": "超加工食品を控えると自然にカロリーが減少―2026年研究が示す食環境の影響", "badge": "yellow", "badgeLabel": "日本と海外で乖離", "category": "食・栄養", "date": "2026-06-21", "summary": "2026年に報告された研究によると、ソーセージや鶏肉加工品などの超加工食品（UPF）を食事から除くと、果物・野菜の摂取量が増加し、1日の総カロリー摂取量が自然に減少することが示された。2025年Lancet掲載の研究シリーズでは、超加工食品が腸内細菌叢の変化や炎症促進物質の増加と関連する可能性が報告されている。", "yoshinoReading": "漢方家系11代目として「食材の質と加工度」が体の気の巡りに直結すると考えます。精製・添加物が多い超加工食品は漢方で言う「湿熱」を生みやすく、消化器系への負担を増す要因になり得ます。歯科医として口腔内環境と全身疾患の関連を日々診ている立場からも、加工食品中の糖分・酸が口腔内細菌叢を乱し腸内環境へ波及するという視点は重要です。東洋医学の「一物全体食」——丸ごとの食材を食べる——という概念が改めて見直される時代に来ていると感じます。", "primarySources": [{"title": "超加工食品を控えてカロリー減の研究結果 果物や野菜の摂取増加で（日本経済新聞 2026年4月）", "url": "https://www.nikkei.com/article/DGXZQOUD037360T00C26A4000000/"}, {"title": "2025年Lancet最新三部作：超加工食品（UPF）の健康リスク解説", "url": "https://totsukaclinic.com/2025/11/20/%e3%80%902025%e5%b9%b4lancet%e7%9b%b4%e8%bf%91%e4%b8%89%e9%83%a8%e4%bd%9c%e3%80%91%e8%b6%85%e5%8a%a0%e5%b7%a5%e9%a3%9f%e5%93%81%ef%bc%88upf%ef%bc%89%e3%81%ae%e5%85%a8%e5%81%a5%e5%ba%b7%e3%83%aa/"}], "japanSources": [{"media": "日本経済新聞", "title": "超加工食品を控えてカロリー減の研究結果 果物や野菜の摂取増加で", "url": "https://www.nikkei.com/article/DGXZQOUD037360T00C26A4000000/"}], "credibilityScore": 4, "tags": ["超加工食品", "UPF", "腸内細菌", "食の質", "カロリー"]}, {"id": "art038", "title": "日本人の腸内細菌は世界と異なる―37カ国比較研究が示す海藻食との共進化", "badge": "green", "badgeLabel": "重要背景情報", "category": "腸内環境", "date": "2026-06-21", "summary": "東京大学大学院が世界37カ国・約2万人のデータを解析した研究によると、ノリやワカメなどの海藻由来多糖類を分解する酵素が日本人の約90％に存在することが確認された。他地域ではほとんど見られないこの特徴は、日本の伝統食との長期的な共進化を示唆するものとして注目されている。また日本人腸内にはビフィズス菌が豊富であることも特徴として報告されている。", "yoshinoReading": "「人は環境と食によって形成される」という漢方の考えを体現する研究結果です。日本人の身体が何世代にもわたる伝統食への適応を遂げているという科学的証拠が示されました。海藻は漢方でも「気を巡らせ、痰を化す」食材として重宝されてきました。グローバル化による欧米食への移行が、日本人固有の腸内環境に悪影響を与えている可能性をこの研究は示唆しています。伝統食を守ることが日本人の健康維持に直結するという観点から、非常に重要な知見です。", "primarySources": [{"title": "日本人の腸内細菌は世界とどう違う？世界37カ国の大規模比較（東京大学大学院 新領域創成科学研究科）", "url": "https://www.k.u-tokyo.ac.jp/information/category/press/0029170.html"}], "japanSources": [{"media": "東京大学大学院 新領域創成科学研究科", "title": "日本人の腸内細菌は世界とどう違う？―世界37カ国の大規模比較から見えた日本人腸内マイクロバイオームの特徴", "url": "https://www.k.u-tokyo.ac.jp/information/category/press/0029170.html"}], "credibilityScore": 5, "tags": ["腸内細菌", "日本人", "海藻", "伝統食", "マイクロバイオーム", "東京大学"]}, {"id": "art039", "title": "ネオニコチノイド農薬、日本の規制は国際基準より緩く―EU輸出の壁に", "badge": "red", "badgeLabel": "日本未報道", "category": "農薬・食の安全", "date": "2026-06-21", "summary": "日経ビジネスおよびEcoNetworksの報告によると、ネオニコチノイド系農薬を含む日本の農薬規制は国際基準と比べて緩いケースが多く、日本国内基準で生産した農作物がEU向け輸出時に残留基準を満たせない事例が生じている。EUは2013年以降ミツバチへの悪影響を根拠に規制を段階的に強化してきた一方、日本での規制強化は遅れていると指摘されている。", "yoshinoReading": "農薬問題は農業政策にとどまらず、患者さんの口腔・全身健康に直結するテーマです。ネオニコチノイドは神経系に作用する物質であり、腸管神経系や免疫系への影響が懸念されています。東洋医学では体内の「毒」を排除する力を「正気」と呼びますが、慢性的な低濃度農薬曝露は正気を弱める要因の一つになり得ると考えます。歯科医として口腔内組織への農薬の影響も無視できません。日本が国際基準と乖離したまま規制緩和を続けることのリスクについて、社会全体で議論が必要だと感じます。", "primarySources": [{"title": "世界に逆行する日本の「緩い」農薬ルール EU新規制が食品輸出の障壁に（日経ビジネス）", "url": "https://business.nikkei.com/atcl/gen/19/00532/030200011/"}, {"title": "世界に遅れを取る日本のネオニコチノイド規制（EcoNetworks）", "url": "https://www.econetworks.jp/translationtips/2024/10/neonico/"}], "japanSources": [{"media": "日経ビジネス", "title": "世界に逆行する日本の「緩い」農薬ルール EU新規制が食品輸出の障壁に", "url": "https://business.nikkei.com/atcl/gen/19/00532/030200011/"}], "credibilityScore": 4, "tags": ["ネオニコチノイド", "農薬", "EU規制", "食の安全", "ミツバチ", "グリホサート"]}, {"id": "art040", "title": "2026年4月施行・食品表示改正―輸入食品の添加物表示義務が強化、国際基準との差異も課題", "badge": "yellow", "badgeLabel": "日本と海外で乖離", "category": "食品添加物・規制", "date": "2026-06-21", "summary": "2026年4月に施行された食品表示基準の改正により、輸入食品における添加物の機能別・物質名表示が義務化された。海外ラベルをそのまま日本で使用することが不可能となり、食品輸入事業者は日本独自の表示基準への対応を求められている。一方、日本が許可する食品添加物の品目数はEUや一部の国と大きく異なり、国際的な調和に向けた議論が続いている。", "yoshinoReading": "食品添加物の問題は「何が許可されているか」だけでなく「なぜ各国で差があるのか」を深く考える必要があります。漢方の観点では、自然界に存在しない化学物質は体にとって「異物」であり、それを処理するために臓器への負担がかかり得ます。特に腸内細菌叢への影響は近年の研究で着目されており、乳化剤や保存料の一部が腸内環境を変化させる可能性が報告されています。日本の食品添加物基準が国際基準と乖離している現状を、消費者として正しく知ることが健康を守る第一歩です。", "primarySources": [{"title": "2026年対応・食品表示改正で輸入食品はどう変わる？添加物・原材料表示の実務チェックリスト", "url": "https://japan-import-guide.com/food-labeling-revision-2026-import/"}, {"title": "日本と海外の食品添加物規制の違い（農林水産省GFP加工食品部会資料）", "url": "https://www.maff.go.jp/j/shokusan/sanki/soumu/attach/pdf/bunkakai-153.pdf"}], "japanSources": [{"media": "農林水産省", "title": "日本と海外の食品添加物規制の違い（一社）日本食品添加物協会 GFP加工食品部会資料", "url": "https://www.maff.go.jp/j/shokusan/sanki/soumu/attach/pdf/bunkakai-153.pdf"}], "credibilityScore": 4, "tags": ["食品添加物", "食品表示", "規制", "輸入食品", "EU", "2026年改正"]}, {"id": "art041", "title": "「口は腸の始まり」―口腔ケアが腸内環境を整える2026年の新常識", "badge": "green", "badgeLabel": "重要背景情報", "category": "口腔・腸内環境", "date": "2026-06-21", "summary": "2026年に注目が高まっている「口腸軸（oral-gut axis）」の概念によると、口腔内細菌が腸内に到達することで腸内細菌叢を乱す可能性があることが医療現場で認識されるようになってきた。適切な口腔衛生管理が腸内環境改善の入口となり得るという視点が、歯科・消化器科の両領域で共有されつつある。また2026年の腸活トレンドとして「菌の多様性」と「シンバイオティクス」が注目されている。", "yoshinoReading": "歯科医として30年以上患者を診てきた経験から、「口腔と全身疾患の関連」は私が最も注力してきたテーマです。歯周病菌が血流を通じて全身に波及し炎症を引き起こすこと、そして口腔内の悪玉菌が腸内細菌バランスを乱すことは複数の研究で報告されています。漢方では「脾胃（消化器系）」の始まりとして口を重視します。毎日の丁寧な歯磨き・舌ケアが腸活の第一歩であるという考え方は、東西医学が一致する貴重な知見です。歯を磨くことは腸を守ることでもある、ということを多くの方に知っていただきたいです。", "primarySources": [{"title": "2026年は「口元」から変わる。腸活の常識を覆す新事実（箕面ファミリー歯科）", "url": "https://us-familydental.com/blog/2026%E5%B9%B4%E3%81%AF%E3%80%8C%E5%8F%A3%E5%85%83%E3%80%8D%E3%81%8B%E3%82%89%E5%A4%89%E3%82%8F%E3%82%8B%E3%80%82%E8%85%B8%E6%B4%BB%E3%81%AE%E5%B8%B8%E8%AD%98%E3%82%92%E8%A6%86%E3%81%99%E6%96%B0/"}, {"title": "最新腸活トレンド5―2026年版（FANCL CLIP）", "url": "https://www.fancl.co.jp/clip/healthcare/feature/2602-2/index.html"}], "japanSources": [{"media": "箕面ファミリー歯科 公式ブログ", "title": "2026年は「口元」から変わる。腸活の常識を覆す新事実", "url": "https://us-familydental.com/blog/2026%E5%B9%B4%E3%81%AF%E3%80%8C%E5%8F%A3%E5%85%83%E3%80%8D%E3%81%8B%E3%82%89%E5%A4%89%E3%82%8F%E3%82%8B%E3%80%82%E8%85%B8%E6%B4%BB%E3%81%AE%E5%B8%B8%E8%AD%98%E3%82%92%E8%A6%86%E3%81%99%E6%96%B0/"}], "credibilityScore": 3, "tags": ["口腔ケア", "腸内環境", "口腸軸", "歯周病", "腸活", "予防医学"]}];

const PASSWORD = 'yoshirin100';
let articles = [];
let histArticles = [];
let histSeries = [];
let currentFilter = 'all';

// ===== AUTH =====
function unlock() {
  const v = document.getElementById('pwInput').value;
  if (v === PASSWORD) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    document.getElementById('pwErr').style.display = 'block';
    document.getElementById('pwInput').value = '';
  }
}
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key==='Enter') unlock(); });

function logout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('lockScreen').style.display = 'flex';
  document.getElementById('pwInput').value = '';
}


// ===== INIT =====
function init() {
  articles = EMBEDDED_ARTICLES;
  histArticles = EMBEDDED_HISTORY_ARTICLES;
  histSeries = EMBEDDED_HISTORY_SERIES;
  renderArticles();
  renderSeries();
}

// ===== NAV =====
function showSection(sec, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('section-news').style.display = sec==='news' ? 'block' : 'none';
  document.getElementById('section-history').style.display = sec==='history' ? 'block' : 'none';
  document.getElementById('section-log').style.display = sec==='log' ? 'block' : 'none';
  if (sec === 'log') renderLog();
}

// ===== ARTICLES =====
function filterArticles(badge, btn) {
  currentFilter = badge;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderArticles();
}

function renderArticles() {
  const filtered = (currentFilter === 'all' ? articles : articles.filter(a => a.badge === currentFilter))
    .slice().sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  document.getElementById('artCount').textContent = filtered.length + ' 件';
  document.getElementById('articlesGrid').innerHTML = filtered.map(a => `
    <div class="article-card" onclick="openArticle('${a.id}')">
      <div class="art-header">
        <span class="badge badge-${a.badge}">${badgeIcon(a.badge)} ${a.badgeLabel}</span>
        <span class="art-category">${a.category}</span>
        <span class="art-date">更新日 ${a.date}</span>
      </div>
      <div class="art-body">
        <div class="art-title">${a.title}</div>
        <div class="art-summary">${a.summary}</div>
      </div>
      <div class="art-footer">
        <div class="stars">${stars(a.credibilityScore)}</div>
        <span style="flex:1"></span>
        <button class="btn-script" onclick="event.stopPropagation();openScript('${a.id}')">📝 台本生成</button>
        <button class="btn-delete" id="del-${a.id}" onclick="event.stopPropagation();deleteArticle('${a.id}')">🗑</button>
      </div>
    </div>
  `).join('');
}

function stars(n) {
  let s='';
  for(let i=1;i<=5;i++) s+=`<span class="${i<=n?'star':'star-e'}">★</span>`;
  return s;
}

// ===== ARTICLE MODAL =====
function openArticle(id) {
  const a = articles.find(x=>x.id===id);
  if (!a) return;
  const srcs = [...(a.primarySources||[]).map(s=>`<div class="modal-source"><span class="modal-dot"></span><span>【一次資料】<a href="${s.url}" target="_blank" class="modal-link" rel="noopener">${s.title}</a></span></div>`),
    ...(a.japanSources||[]).map(s=>`<div class="modal-source"><span class="modal-dot" style="background:var(--yellow)"></span><span>【${s.media}】<a href="${s.url}" target="_blank" class="modal-link" style="color:var(--yellow)" rel="noopener">${s.title}</a></span></div>`)].join('');
  document.getElementById('modalBody').innerHTML = `
    <span class="badge badge-${a.badge}">${badgeIcon(a.badge)} ${a.badgeLabel}</span>
    <div class="modal-title" style="margin-top:10px">${a.title}</div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;font-size:11px;color:var(--muted)">
      <span>${a.category}</span><span>更新日 ${a.date}</span><div class="stars">${stars(a.credibilityScore)}</div>
    </div>
    <div class="modal-label">📋 概要</div>
    <div class="modal-summary">${a.summary}</div>
    <div class="modal-label">🌿 吉野の読み</div>
    <div class="modal-yoshino">${a.yoshinoReading}</div>
    <div class="modal-label">📚 出典・一次資料</div>
    <div class="modal-sources">${srcs||'<span style="font-size:11px;color:var(--muted)">出典なし</span>'}</div>
    <div class="modal-disclaimer">⚠️ 本記事は動画制作のための情報整理目的です。医療診断・治療の推奨ではありません。健康上の判断は医師・専門家にご相談ください。</div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

// ===== SCRIPT MODAL =====

■ オープニング（0:00〜2:00）
・今日のテーマ提示：「${a.title}」
・なぜ今これを取り上げるか（吉野視点）
・視聴者への問いかけ

■ データ・事実の提示（2:00〜10:00）
・${a.summary}
・数字・統計・研究結果の提示
・図解・グラフのナレーション

■ 吉野の読み（10:00〜22:00）
・${a.yoshinoReading}
・東洋医学・漢方医学の視点との接続
・日本と海外の対比（具体的なデータ）
・政治・行政の構造的背景

■ 視聴者が今できること（22:00〜28:00）
・具体的なアクション3つ
・情報源の確認方法
・注意事項（医療アドバイスでないことの明示）

■ まとめ・次回予告（28:00〜30:00）
・今日のキーポイント3行
・次回予告

【使用すべき一次資料】
${(a.primarySources||[]).map(s=>'・'+s.title+'\n  '+s.url).join('\n')}

⚠️ 注意：医師法・景品表示法に配慮し、断定的な健康効果の主張は避けること。`;

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-title">📝 台本構成：${a.title.substring(0,30)}…</div>
    <div class="script-modal">${script}</div>
    <button onclick="navigator.clipboard.writeText(document.querySelector('.script-modal').textContent).then(()=>showToast('✅ コピーしました'))"
      style="margin-top:10px;background:var(--green-dim);color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:12px;cursor:pointer;width:100%">
      📋 クリップボードにコピー
    </button>
  `;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
}
function closeModalOnBg(e) {
  if (e.target===document.getElementById('modalOverlay')) closeModal();
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ===== HISTORY =====
const seriesIcons = {series001:'🍚',series002:'🏛️',series003:'🍬',series004:'🫙'};
const seriesBg = {
  series001:'linear-gradient(135deg,#3d2b1f,#5c4033)',
  series002:'linear-gradient(135deg,#1f2a35,#2d3d4f)',
  series003:'linear-gradient(135deg,#3d2510,#6b3a18)',
  series004:'linear-gradient(135deg,#1a3020,#2d5035)'
};

function renderSeries() {
  document.getElementById('seriesGrid').innerHTML = histSeries.map(s => `
    <div class="series-card" id="sc-${s.id}" style="background:${seriesBg[s.id]||'linear-gradient(135deg,#2a2a2a,#3a3a3a)'}" onclick="selectSeries('${s.id}')">
      <div class="series-icon">${seriesIcons[s.id]||'📖'}</div>
      <div class="series-title">${s.title}</div>
      <div class="series-desc">${s.description.substring(0,80)}…</div>
      <div class="series-count">全${s.episodes}話構成</div>
    </div>
  `).join('');
}

function selectSeries(sid) {
  document.querySelectorAll('.series-card').forEach(c=>c.classList.remove('active'));
  document.getElementById('sc-'+sid).classList.add('active');
  const s = histSeries.find(x=>x.id===sid);
  const eps = histArticles.filter(e=>e.seriesId===sid);
  document.getElementById('epTitle').textContent = (seriesIcons[sid]||'📖')+' '+s.title;
  document.getElementById('epCards').innerHTML = eps.map(ep => `
    <div class="ep-card">
      <div class="ep-num">E${ep.episode}</div>
      <div>
        <span class="ep-status ${ep.status}">${ep.status==='published'?'✅ 公開済':'📋 制作予定'}</span>
        <div class="ep-title">${ep.title}</div>
        <div class="ep-summary">${ep.summary}</div>
        <div class="ep-angle">💡 ${ep.yoshinoAngle.substring(0,80)}…</div>
        <div class="ep-footer">
          <span class="ep-duration">⏱ ${ep.duration}</span>
          <button class="btn-script-ep" onclick="openEpScript('${ep.id}')">📝 台本生成</button>
        </div>
      </div>
    </div>
  `).join('');
  document.getElementById('epContainer').style.display='block';
  document.getElementById('epContainer').scrollIntoView({behavior:'smooth',block:'start'});
}

function openEpScript(id) {
  const ep = histArticles.find(e=>e.id===id);
  if (!ep) return;
  const script = `【${ep.title}】台本構成案（${ep.duration}）

■ オープニング（0:00〜2:00）
・今回のテーマ「${ep.title}」を提示
・なぜ今この歴史を知るべきか

■ 歴史的背景の概説（2:00〜8:00）
・${ep.summary.substring(0,100)}...
・時代背景・社会的文脈

■ 一次資料をもとにした詳細解説（8:00〜20:00）
・${(ep.primarySources||[]).map(s=>'「'+s.title+'」をもとに').join('・')}
・具体的な史実・数字の提示

■ 吉野視点：現代への示唆（20:00〜27:00）
・${ep.yoshinoAngle}
・現代の問題との接続

■ まとめ（27:00〜${ep.duration.replace('約','').replace('分','')>28?ep.duration:'30分'})
・今日のキーポイント
・次回予告

【使用すべき一次資料】
${(ep.primarySources||[]).map(s=>'・'+s.title+'\n  '+s.url).join('\n')}`;

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-title">📝 台本構成：${ep.title.substring(0,30)}…</div>
    <div class="script-modal">${script}</div>
    <button onclick="navigator.clipboard.writeText(document.querySelector('.script-modal').textContent).then(()=>showToast('✅ コピーしました'))"
      style="margin-top:10px;background:var(--brown-dim);color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:12px;cursor:pointer;width:100%">
      📋 クリップボードにコピー
    </button>
  `;
  document.getElementById('modalOverlay').classList.add('open');

// ===== UPDATE LOG =====
function renderLog() {
  const sorted = [...articles].sort((a,b) => b.date.localeCompare(a.date));
  document.getElementById('logList').innerHTML = sorted.length === 0
    ? '<div style="color:var(--muted);font-size:13px">記事がありません</div>'
    : sorted.map(a => `
      <div class="log-item" id="logrow-${a.id}">
        <span class="log-date">${a.date}</span>
        <span class="badge badge-${a.badge}" style="font-size:10px">${badgeIcon(a.badge)} ${a.badgeLabel}</span>
        <span class="log-cat">${a.category}</span>
        <span class="log-title" onclick="openArticle('${a.id}')">${a.title}</span>
        <button class="btn-delete" id="logdel-${a.id}" onclick="deleteArticle('${a.id}')">🗑 削除</button>
      </div>
    `).join('');
}

// ===== DELETE =====
async function deleteArticle(id) {
  if (!confirm('この記事を削除しますか？\nGitHubから削除され、数分後にサイトに反映されます。')) return;
  ['del-'+id, 'logdel-'+id].forEach(bid => {
    const b = document.getElementById(bid);
    if (b) { b.classList.add('deleting'); b.textContent = '削除中...'; }
  });
  try {
    const res = await fetch('/api/delete', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({id})
    });
    if (res.ok) {
      articles = articles.filter(a => a.id !== id);
      renderArticles();
      renderLog();
      showToast('✅ 削除しました（数分後にサイトへ反映）');
    } else {
      const d = await res.json().catch(()=>({}));
      showToast('❌ 削除失敗: ' + (d.message || d.error || 'エラー'));
      ['del-'+id, 'logdel-'+id].forEach(bid => {
        const b = document.getElementById(bid);
        if (b) { b.classList.remove('deleting'); b.textContent = bid.startsWith('logdel') ? '🗑 削除' : '🗑'; }
      });
    }
  } catch(e) {
    showToast('❌ 通信エラー');
  }
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}
