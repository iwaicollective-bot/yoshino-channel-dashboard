<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吉野敏明チャンネル | テーマ出しダッシュボード</title>
<style>
:root {
  --bg: #0d1f14;
  --surface: #152b1e;
  --surface2: #1e3a28;
  --border: #2d5a3d;
  --text: #f0faf4;
  --muted: #7eab8e;
  --green: #52b788;
  --green-dim: #2d6a4f;
  --brown: #c9a84c;
  --brown-dim: #744210;
  --red: #f87171;
  --yellow: #fbbf24;
  --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Hiragino Sans','Yu Gothic','Meiryo',sans-serif; min-height:100vh; }

/* ── LOCK ── */
#lockScreen {
  position:fixed; inset:0; background:linear-gradient(135deg,#071409,#0d1f14);
  display:flex; align-items:center; justify-content:center; z-index:9999;
}
.lock-box {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:48px 40px; text-align:center; width:360px;
}
.lock-logo { font-size:36px; margin-bottom:10px; }
.lock-title { font-size:18px; font-weight:700; color:var(--green); margin-bottom:4px; }
.lock-sub { font-size:12px; color:var(--muted); margin-bottom:28px; }
.lock-input {
  width:100%; background:var(--bg); border:1px solid var(--border);
  color:var(--text); font-size:22px; text-align:center; letter-spacing:6px;
  padding:12px; border-radius:8px; margin-bottom:12px; outline:none;
}
.lock-input:focus { border-color:var(--green); }
.lock-btn {
  width:100%; background:var(--green-dim); color:#fff; border:none;
  padding:12px; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer;
}
.lock-btn:hover { background:var(--green); }
.lock-err { color:var(--red); font-size:12px; margin-top:8px; display:none; }

/* ── APP ── */
#app { display:none; }

/* ── HEADER ── */
.header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0 20px; height:56px; display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
}
.header-left { display:flex; align-items:center; gap:10px; }
.header-logo { font-size:20px; }
.header-title { font-size:14px; font-weight:700; color:var(--green); }
.header-sub { font-size:10px; color:var(--muted); }
.header-right { display:flex; align-items:center; gap:8px; }
.btn-update {
  background:none; border:1px solid var(--green); color:var(--green);
  padding:5px 12px; border-radius:6px; font-size:11px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; gap:4px; transition:all .2s;
}
.btn-update:hover { background:var(--green); color:#000; }
.btn-update.loading { opacity:.6; pointer-events:none; }
.btn-logout {
  background:none; border:1px solid rgba(255,255,255,.2);
  color:var(--muted); padding:5px 10px; border-radius:6px;
  font-size:11px; cursor:pointer;
}
.btn-logout:hover { color:var(--text); border-color:rgba(255,255,255,.4); }
.yt-btn {
  background:rgba(255,0,0,.8); color:#fff; border:none;
  padding:5px 10px; border-radius:6px; font-size:11px; font-weight:700;
  text-decoration:none; cursor:pointer;
}

/* ── NAV ── */
.nav {
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; overflow-x:auto; scrollbar-width:none;
}
.nav::-webkit-scrollbar { display:none; }
.nav-btn {
  padding:10px 18px; background:none; border:none; color:var(--muted);
  font-size:13px; font-weight:500; cursor:pointer; white-space:nowrap;
  border-bottom:2px solid transparent; transition:all .2s;
}
.nav-btn.active { color:var(--green); border-bottom-color:var(--green); }
.nav-btn.hist.active { color:var(--brown); border-bottom-color:var(--brown); }

/* ── CONTAINER ── */
.container { max-width:1000px; margin:0 auto; padding:20px 16px; }

/* ── FILTER BAR ── */
.filter-bar {
  display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; align-items:center;
}
.filter-btn {
  padding:4px 12px; border-radius:16px; border:1px solid rgba(255,255,255,.15);
  background:none; color:var(--muted); font-size:12px; cursor:pointer; transition:all .2s;
}
.filter-btn.active, .filter-btn:hover {
  background:rgba(255,255,255,.08); color:var(--text); border-color:rgba(255,255,255,.3);
}
.article-count {
  margin-left:auto; font-size:11px; color:var(--muted);
}

/* ── DISCLAIMER ── */
.disclaimer {
  background:rgba(251,191,36,.08); border:1px solid rgba(251,191,36,.2);
  border-radius:8px; padding:8px 14px; font-size:11px; color:var(--muted);
  margin-bottom:16px; line-height:1.5;
}

/* ── ARTICLE CARDS ── */
.articles-grid { display:grid; gap:12px; }
.article-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); overflow:hidden; cursor:pointer;
  transition:all .2s;
}
.article-card:hover { border-color:var(--green); transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,.3); }

.art-header {
  display:flex; align-items:center; gap:8px; padding:10px 14px 6px;
  border-bottom:1px solid var(--border);
}
.badge {
  padding:2px 9px; border-radius:10px; font-size:10px; font-weight:700; white-space:nowrap;
}
.badge-red { background:rgba(248,113,113,.15); color:var(--red); border:1px solid rgba(248,113,113,.3); }
.badge-yellow { background:rgba(251,191,36,.12); color:var(--yellow); border:1px solid rgba(251,191,36,.25); }
.badge-green { background:rgba(82,183,136,.15); color:var(--green); border:1px solid rgba(82,183,136,.3); }
.art-category { font-size:10px; color:var(--green); background:rgba(45,106,79,.3); padding:2px 7px; border-radius:4px; }
.art-date { font-size:10px; color:var(--muted); margin-left:auto; }

.art-body { padding:10px 14px; }
.art-title { font-size:14px; font-weight:700; line-height:1.5; margin-bottom:6px; }
.art-summary {
  font-size:12px; color:var(--muted); line-height:1.6;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}

.art-footer {
  display:flex; align-items:center; gap:8px; padding:8px 14px;
  border-top:1px solid var(--border);
}
.art-tags { display:flex; gap:5px; flex-wrap:wrap; flex:1; }
.tag { font-size:10px; color:var(--muted); background:rgba(255,255,255,.05); padding:2px 7px; border-radius:4px; }
.btn-script {
  background:none; border:1px solid var(--green); color:var(--green);
  padding:4px 10px; border-radius:5px; font-size:11px; cursor:pointer;
  white-space:nowrap; transition:all .2s;
}
.btn-script:hover { background:var(--green); color:#000; }
.stars { display:flex; gap:2px; }
.star { font-size:10px; color:var(--yellow); }
.star-e { font-size:10px; color:rgba(255,255,255,.15); }

/* ── HISTORY ── */
#section-history { display:none; }
.series-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; margin-bottom:24px;
}
.series-card {
  border-radius:var(--radius); padding:16px; cursor:pointer;
  border:1px solid rgba(255,255,255,.1); transition:all .2s;
}
.series-card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.4); border-color:rgba(255,255,255,.25); }
.series-card.active { border-color:var(--brown); }
.series-icon { font-size:24px; margin-bottom:8px; }
.series-title { font-size:13px; font-weight:700; margin-bottom:4px; line-height:1.4; }
.series-desc { font-size:11px; color:rgba(255,255,255,.55); line-height:1.5; margin-bottom:6px; }
.series-count { font-size:10px; color:rgba(255,255,255,.35); }

.ep-section-title {
  font-size:13px; font-weight:700; color:var(--brown); margin-bottom:12px;
  display:flex; align-items:center; gap:6px;
}
.ep-cards { display:grid; gap:10px; }
.ep-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:14px; cursor:pointer;
  display:grid; grid-template-columns:36px 1fr; gap:12px; transition:all .2s;
}
.ep-card:hover { border-color:rgba(201,168,76,.4); transform:translateX(3px); }
.ep-num {
  width:32px; height:32px; background:rgba(116,66,16,.35);
  border:1px solid rgba(201,168,76,.25); border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; color:var(--brown); flex-shrink:0;
}
.ep-status {
  display:inline-block; font-size:10px; padding:1px 6px; border-radius:4px; margin-bottom:4px;
}
.ep-status.published { background:rgba(82,183,136,.15); color:var(--green); border:1px solid rgba(82,183,136,.3); }
.ep-status.planned { background:rgba(255,255,255,.05); color:var(--muted); border:1px solid rgba(255,255,255,.1); }
.ep-title { font-size:13px; font-weight:700; margin-bottom:4px; line-height:1.4; }
.ep-summary { font-size:11px; color:var(--muted); line-height:1.5; margin-bottom:6px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.ep-angle {
  font-size:11px; color:var(--brown); background:rgba(116,66,16,.15);
  border-left:2px solid var(--brown); padding:5px 9px; border-radius:0 5px 5px 0; line-height:1.5;
}
.ep-footer {
  display:flex; align-items:center; gap:8px; margin-top:8px;
}
.ep-duration { font-size:10px; color:rgba(255,255,255,.3); }
.btn-script-ep {
  background:none; border:1px solid var(--brown); color:var(--brown);
  padding:3px 9px; border-radius:5px; font-size:10px; cursor:pointer;
  margin-left:auto; white-space:nowrap; transition:all .2s;
}
.btn-script-ep:hover { background:var(--brown); color:#000; }

/* ── MODAL ── */
.modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.85);
  z-index:500; overflow-y:auto; padding:20px; align-items:flex-start; justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; max-width:680px; width:100%; padding:24px; margin:auto; position:relative;
}
.modal-close {
  position:absolute; top:14px; right:14px;
  background:rgba(255,255,255,.08); border:none; color:var(--text);
  width:28px; height:28px; border-radius:50%; font-size:14px; cursor:pointer;
}
.modal-label { font-size:10px; font-weight:700; color:var(--green); text-transform:uppercase; letter-spacing:.05em; margin-top:14px; margin-bottom:4px; }
.modal-title { font-size:16px; font-weight:700; line-height:1.5; margin-bottom:8px; }
.modal-summary { font-size:13px; color:rgba(255,255,255,.8); line-height:1.8; }
.modal-yoshino {
  background:linear-gradient(135deg,rgba(45,106,79,.2),rgba(26,58,42,.3));
  border-left:3px solid var(--green); border-radius:0 8px 8px 0;
  padding:12px 14px; font-size:13px; line-height:1.8; color:rgba(255,255,255,.85);
}
.modal-sources { display:flex; flex-direction:column; gap:5px; }
.modal-source { display:flex; gap:7px; align-items:flex-start; font-size:12px; line-height:1.4; }
.modal-dot { width:5px; height:5px; background:var(--green); border-radius:50%; flex-shrink:0; margin-top:4px; }
.modal-link { color:var(--green); text-decoration:none; }
.modal-link:hover { text-decoration:underline; }
.modal-disclaimer {
  margin-top:14px; padding:8px 12px; background:rgba(255,255,255,.03);
  border-radius:6px; font-size:11px; color:rgba(255,255,255,.3); line-height:1.5;
  border:1px solid rgba(255,255,255,.05);
}
.script-modal {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; padding:16px; font-size:12px; line-height:1.8;
  color:rgba(255,255,255,.75); white-space:pre-wrap; margin-top:4px;
}

/* ── TOAST ── */
.toast {
  position:fixed; bottom:20px; right:20px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:10px 16px; font-size:12px;
  box-shadow:0 4px 16px rgba(0,0,0,.4); z-index:9000;
  opacity:0; transform:translateY(8px); transition:all .3s; pointer-events:none;
}
.toast.show { opacity:1; transform:translateY(0); }

@media(max-width:600px) {
  .header-title { font-size:12px; }
  .container { padding:14px 10px; }
  .modal { padding:18px; }
  .series-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-logo">🌿</div>
    <div class="lock-title">吉野敏明チャンネル</div>
    <div class="lock-sub">テーマ出しダッシュボード — 関係者専用</div>
    <input type="password" class="lock-input" id="pwInput" placeholder="••••••" maxlength="30">
    <button class="lock-btn" onclick="unlock()">ログイン</button>
    <div class="lock-err" id="pwErr">パスワードが違います</div>
  </div>
</div>

<div id="app">
  <header class="header">
    <div class="header-left">
      <span class="header-logo">🌿</span>
      <div>
        <div class="header-title">吉野敏明チャンネル</div>
        <div class="header-sub">テーマ出しダッシュボード</div>
      </div>
    </div>
    <div class="header-right">
      <a href="https://www.youtube.com/@yoshinodo" target="_blank" class="yt-btn">▶ YouTube</a>
      <button class="btn-update" id="btnUpdate" onclick="triggerUpdate()">🔄 題材更新</button>
      <button class="btn-logout" onclick="logout()">ログアウト</button>
    </div>
  </header>

  <nav class="nav">
    <button class="nav-btn active" onclick="showSection('news',this)">📰 健康・食ニュース分析</button>
    <button class="nav-btn hist" onclick="showSection('history',this)">📜 食の歴史シリーズ</button>
  </nav>

  <!-- NEWS -->
  <div id="section-news">
    <div class="container">
      <div class="disclaimer">⚠️ 本ダッシュボードは動画制作のための情報整理ツールです。医療診断・治療の推奨ではありません。</div>
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterArticles('all',this)">すべて</button>
        <button class="filter-btn" onclick="filterArticles('red',this)">🔴 日本未報道</button>
        <button class="filter-btn" onclick="filterArticles('yellow',this)">🟡 日本と海外で乖離</button>
        <button class="filter-btn" onclick="filterArticles('green',this)">🟢 重要背景情報</button>
        <span class="article-count" id="artCount"></span>
      </div>
      <div class="articles-grid" id="articlesGrid"></div>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="section-history">
    <div class="container">
      <div class="series-grid" id="seriesGrid"></div>
      <div id="epContainer" style="display:none;">
        <div class="ep-section-title" id="epTitle"></div>
        <div class="ep-cards" id="epCards"></div>
      </div>
    </div>
  </div>
</div>

<!-- ARTICLE MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>

const EMBEDDED_ARTICLES = [{"id": "art001", "title": "Lancet誌が1000万人データで証明：超加工食品が全臓器のリスクを高める", "badge": "red", "badgeLabel": "日本未報道", "category": "食・栄養", "date": "2025-11-20", "summary": "2025年Lancet誌に掲載された超加工食品（UPF）に関する三部作研究が、45の解析のうち71%で超加工食品と健康悪化の直接的関連を示した。大腸がん・心疾患・糖尿病・うつ病・早死にリスクが統計的に有意に上昇することが1000万人規模のデータで確認された。", "yoshinoReading": "これは「食べ物の質」の問題ではなく「食べ物の加工度」の問題。カロリーが同じでも、工業的に製造された食品は腸内細菌叢を破壊し、慢性炎症を引き起こす。西洋医学が長らく「バランスの良い食事」と言い続けてきた間に、何が起きていたのかを改めて問い直す必要がある。", "primarySources": [{"title": "Lancet Regional Health 2025 – Ultra-processed food consumption and health", "url": "https://www.thelancet.com/journals/lanwpc/article/PIIS2666-6065(24)00203-0/fulltext"}, {"title": "BMJ 2024 – Ultra-processed food exposure and adverse health outcomes", "url": "https://www.bmj.com/content/384/bmj-2023-077310"}], "japanSources": [{"media": "戸塚クリニック院長ブログ", "title": "2025年Lancet最新三部作：超加工食品（UPF）の健康リスクと今日からできる対策", "url": "https://totsukaclinic.com/2025/11/20/%E3%80%902025%E5%B9%B4lancet%E7%9B%B4%E8%BF%91%E4%B8%89%E9%83%A8%E4%BD%9C%E3%80%91%E8%B6%85%E5%8A%A0%E5%B7%A5%E9%A3%9F%E5%93%81%EF%BC%88upf%EF%BC%89%E3%81%AE%E5%85%A8%E5%81%A5%E5%BA%B7%E3%83%AA/"}], "credibilityScore": 5, "tags": ["超加工食品", "Lancet", "慢性疾患", "腸内環境"]}, {"id": "art002", "title": "日本で合法の食品着色料「赤色106号」、アメリカ・EU・中国を含む多くの国で禁止", "badge": "yellow", "badgeLabel": "日本と海外で乖離", "category": "食品添加物", "date": "2025-10-01", "summary": "日本の和菓子や福神漬けに使われる赤色106号は、肺がん・食道がんとの関連が指摘されており、欧米・アジア各国で禁止されているが日本では使用継続中。また赤色40号（アレルギーリスク）、黄色4号（子どもの多動との関連）なども日本では認可されているが、EUでは警告表示義務がある。", "yoshinoReading": "これは科学の問題ではなく政治の問題。どの添加物を認可するかは食品業界と規制当局の関係性によって決まる。消費者が「成分表示を読む」習慣を持つことが最大の自衛策。歯周病治療の臨床でも、食品添加物の摂取を控えた患者の炎症マーカーが改善する事例を多数経験している。", "primarySources": [{"title": "消費者庁：添加物規制に関する国際比較（令和4年11月更新）", "url": "https://www.caa.go.jp/policies/policy/standards_evaluation/food_additives/qa_consumers/assets/001008754.pdf"}, {"title": "農林水産省：海外食品添加物規制早見表", "url": "https://www.maff.go.jp/j/shokusan/sanki/soumu/attach/pdf/bunkakai-153.pdf"}], "japanSources": [{"media": "女性セブンプラス", "title": "海外では使用が禁止・制限されているのに日本では使われている添加物が多数", "url": "https://j7p.jp/?p=134538"}], "credibilityScore": 4, "tags": ["食品添加物", "着色料", "国際比較", "規制"]}, {"id": "art003", "title": "グリホサート残留基準値、2017年に日本政府が最大400倍に引き上げ——WHOは発がん性グループ2Aに分類", "badge": "yellow", "badgeLabel": "日本と海外で乖離", "category": "農薬・食の安全", "date": "2025-09-15", "summary": "除草剤グリホサートについて、日本は2017年に残留基準値を大幅緩和（ひまわり種子で0.1→40ppm、400倍）。一方WHOの国際がん研究機関IARCは2015年に発がん性グループ2Aに分類し、欧州では規制強化の流れが続く。輸入小麦・大豆への残留が国内消費者に影響する可能性がある。", "yoshinoReading": "規制緩和のタイミングとアメリカからの農産物輸入拡大は無関係ではない。政治と医療・食の安全は不可分の問題。ただし「危険か安全か」の二項対立ではなく、長期的・累積的リスクを個人でどう管理するかを考えることが重要。国産・有機農産物の選択は一つの合理的な対策。", "primarySources": [{"title": "IARC Monographs Volume 112: Glyphosate", "url": "https://www.iarc.who.int/featured-news/media-centre-iarc-news-glyphosate/"}, {"title": "厚生労働省：グリホサートの残留基準設定審議資料", "url": "https://www.mhlw.go.jp/file/05-Shingikai-11121000-Iyakushokuhinkyoku-Soumuka/0000168500.pdf"}, {"title": "衆議院：農薬グリホサート製剤の一日摂取許容量と安全性に関する質問主意書", "url": "https://www.shugiin.go.jp/internet/itdb_shitsumon.nsf/html/shitsumon/a201188.htm"}], "japanSources": [{"media": "コープ自然派", "title": "グリホサートを取り込みたくない！", "url": "https://www.shizenha.net/glyphosate/"}], "credibilityScore": 4, "tags": ["グリホサート", "農薬", "残留基準", "発がん性", "輸入農産物"]}, {"id": "art004", "title": "WHO・ICD-11が鍼灸・漢方を正式認定、北大がメカニズム解明——東洋医学の科学的根拠が確立へ", "badge": "green", "badgeLabel": "重要背景情報", "category": "東洋医学", "date": "2024-05-15", "summary": "2019年WHO総会でICD-11（国際疾病分類）に東洋医学の章が正式追加。2024年5月のNHKスペシャルでは北海道大学・村上正晃教授らが鍼灸の神経回路メカニズムを解明し注目を集めた。鍼灸は感覚神経→中枢神経系→免疫系への経路で抗炎症効果を発揮することが科学的に証明されつつある。", "yoshinoReading": "漢方・鍼灸の家系11代目として言えることは、先人たちが何千年もかけて臨床から積み上げたエビデンスを、西洋科学がようやく「証明」し始めたということ。重要なのは「なぜ効くか」の理解が進むことで、より精密な治療設計が可能になること。東西医学の統合こそが21世紀の医療の姿。", "primarySources": [{"title": "WHO ICD-11 – Traditional Medicine Chapter", "url": "https://icd.who.int/en"}, {"title": "北海道大学医学部：NHKスペシャル「東洋医学を科学する」出演のお知らせ（2024年5月）", "url": "https://www.med.hokudai.ac.jp/news/2024/0515.html"}], "japanSources": [{"media": "NHK", "title": "NHKスペシャル「東洋医学を科学する〜鍼灸・漢方薬の新たな世界〜」", "url": "https://www.youtube.com/watch?v=GSyL41EpCL8"}], "credibilityScore": 5, "tags": ["東洋医学", "鍼灸", "漢方", "WHO", "ICD-11", "科学的根拠"]}, {"id": "art005", "title": "現代小麦は「別の食べ物」——品種改良でグルテン組成が変化、腸への影響を研究者が指摘", "badge": "green", "badgeLabel": "重要背景情報", "category": "食・栄養", "date": "2024-06-20", "summary": "現代の小麦は品種改良により、消化しづらいグルテンたんぱく質を大量に含むよう変化している。農林水産省の資料によれば、グルテン関連疾患の有病率は米食文化圏のアジアではヨーロッパより顕著に低く、遺伝的因子と摂取頻度の両方が関与。腸内細菌叢への影響も報告されている。", "yoshinoReading": "日本人が本来食べていたのは米を主食にした食事。戦後の食生活変化でパン・麺類の消費が急増し、それと時を同じくして腸の不調や自己免疫疾患が増加している。「パンは体に悪い」と言いたいのではなく、自分の体の反応をきちんと観察することが大切。", "primarySources": [{"title": "農林水産省：グルテン関連の疾患とグルテンフリー", "url": "https://www.maff.go.jp/j/syouan/keikaku/soukatu/okome_summary/04/functio_nality_03.html"}], "japanSources": [{"media": "日本経済新聞", "title": "「グルテンフリー」の落とし穴 医学的に意義ある人は少数", "url": "https://www.nikkei.com/article/DGXZQOSG2882H0Y5A320C2000000/"}], "credibilityScore": 3, "tags": ["小麦", "グルテン", "品種改良", "腸内環境", "食文化"]}, {"id": "art006", "title": "米国HHSが「超加工食品の健康リスクへの対処」を政策議題に——日本の食品行政は無反応", "badge": "red", "badgeLabel": "日本未報道", "category": "医療政策", "date": "2026-01-15", "summary": "2026年1月、米国保健福祉省（HHS）・FDA・USDAが共同で超加工食品の健康リスクを公衆衛生上の重大課題として位置付け、食事ガイドラインを更新。肥満・糖尿病・心血管疾患との関連が政府レベルで認定された。日本の食品安全・厚労省からは同様の動きは現時点で出ていない。", "yoshinoReading": "アメリカが動いた。次はどこかが追随する。日本が動くのはその後。この「タイムラグ」の間に何万人もが予防できたはずの病気にかかる。政経医一体で考えなければ、公衆衛生の問題は解決しない。", "primarySources": [{"title": "GMP Platform：HHS/FDA/USDA 超加工食品の健康リスクに対処", "url": "https://www.gmp-platform.com/article_detail.html?id=32627"}], "japanSources": [], "credibilityScore": 4, "tags": ["超加工食品", "米国食事指針", "食品政策", "公衆衛生"]}];
const EMBEDDED_HISTORY_ARTICLES = [{"id": "hist001", "seriesId": "series001", "episode": 1, "title": "縄文人の食卓——1万年の採集食が形成した日本人の体質", "status": "planned", "summary": "縄文時代（約1万4000〜2400年前）の食事は、堅果（どんぐり・栗）・魚介・山菜・獣肉の採集食。農耕開始前の多様な食物摂取が腸内細菌の多様性を支えていた。骨格分析から縄文人が現代日本人より虫歯が少なかったことも確認されている。", "yoshinoAngle": "歯科医として注目したいのは縄文時代の虫歯率の低さ。精製糖・精製炭水化物ゼロの食生活が口腔環境に与えた影響を現代データと比較することで、「食べ方の原点」が見えてくる。", "primarySources": [{"title": "国立歴史民俗博物館：縄文時代の食と生活", "url": "https://www.rekihaku.ac.jp/"}, {"title": "農畜産業振興機構：砂糖の歴史（日本への伝播）", "url": "https://www.alic.go.jp/koho/kikaku03_000078.html"}], "tags": ["縄文", "採集食", "虫歯", "腸内環境"], "duration": "約25分"}, {"id": "hist002", "seriesId": "series001", "episode": 2, "title": "天武天皇の肉食禁止令（675年）——1200年続いた食文化の原点", "status": "planned", "summary": "675年に天武天皇が発布した肉食禁止令は、牛・馬・犬・猿・鶏の食用を禁じた。これにより約1200年間、日本人の動物性たんぱく源は主に魚介類と大豆に限られ、世界的に見ても特異な食文化が形成された。この時代の食事と長寿・疾患パターンとの関連を検証する。", "yoshinoAngle": "仏教的価値観と食文化の融合が、結果として健康的な食事パターンを生み出した歴史。「なぜ日本人が長寿なのか」を政治・宗教・食文化の交差点から読み解く。", "primarySources": [{"title": "日本書紀（国立公文書館デジタルアーカイブ）", "url": "https://www.digital.archives.go.jp/"}], "tags": ["肉食禁止令", "天武天皇", "和食", "長寿"], "duration": "約28分"}, {"id": "hist003", "seriesId": "series002", "episode": 1, "title": "GHQ学校給食改革——パンと脱脂粉乳が日本の食を変えた日", "status": "planned", "summary": "1946年のGHQ指令による学校給食改革で、米飯からパン・脱脂粉乳への転換が始まった。米国産小麦・脱脂粉乳の輸入拡大と連動していたこの政策の背景と、その後の日本人の食生活変化を一次資料で追う。「米は頭が悪くなる」という言説の出所も検証。", "yoshinoAngle": "食料政策は農業政策であり外交政策。GHQ文書・農林省公文書・学校給食法の成立過程を読み解くことで、「誰が何のためにこの政策を推進したか」が明確になる。", "primarySources": [{"title": "国立公文書館：GHQ/SCAP文書（学校給食関連）", "url": "https://www.digital.archives.go.jp/"}, {"title": "文部科学省：学校給食の歴史", "url": "https://www.mext.go.jp/a_menu/sports/syokuiku/1292952.htm"}], "tags": ["GHQ", "学校給食", "小麦政策", "占領期", "食料転換"], "duration": "約30分"}, {"id": "hist004", "seriesId": "series002", "episode": 2, "title": "昭和30〜50年代の食生活変容——米消費量激減と生活習慣病急増の相関", "status": "planned", "summary": "1960〜1980年代に米の消費量は半減し、小麦・油脂・砂糖・乳製品の消費が急増。同時期に糖尿病・心疾患・大腸がんの患者数が増加した統計データを、農林水産省・厚生労働省の公式資料をもとに検証する。" // ===== STATE =====
const PASSWORD = 'yoshirin100';
let articles = [];
let histArticles = [];
let histSeries = [];
let currentFilter = 'all';

// ===== AUTH =====
function unlock() {
  const v = document.getElementById('pwInput').value;
  if (v === PASSWORD) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    document.getElementById('pwErr').style.display = 'block';
    document.getElementById('pwInput').value = '';
  }
}
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key==='Enter') unlock(); });

function logout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('lockScreen').style.display = 'flex';
  document.getElementById('pwInput').value = '';
}

// ===== INIT =====
function init() {
  articles = EMBEDDED_ARTICLES;
  histArticles = EMBEDDED_HISTORY_ARTICLES;
  histSeries = EMBEDDED_HISTORY_SERIES;
  renderArticles();
  renderSeries();
}

// ===== NAV =====
function showSection(sec, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('section-news').style.display = sec==='news' ? 'block' : 'none';
  document.getElementById('section-history').style.display = sec==='history' ? 'block' : 'none';
}

// ===== ARTICLES =====
function filterArticles(badge, btn) {
  currentFilter = badge;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderArticles();
}

function renderArticles() {
  const filtered = currentFilter === 'all' ? articles : articles.filter(a => a.badge === currentFilter);
  document.getElementById('artCount').textContent = filtered.length + ' 件';
  document.getElementById('articlesGrid').innerHTML = filtered.map(a => `
    <div class="article-card" onclick="openArticle('${a.id}')">
      <div class="art-header">
        <span class="badge badge-${a.badge}">${badgeIcon(a.badge)} ${a.badgeLabel}</span>
        <span class="art-category">${a.category}</span>
        <span class="art-date">${a.date}</span>
      </div>
      <div class="art-body">
        <div class="art-title">${a.title}</div>
        <div class="art-summary">${a.summary}</div>
      </div>
      <div class="art-footer">
        <div class="art-tags">${(a.tags||[]).slice(0,3).map(t=>`<span class="tag">#${t}</span>`).join('')}</div>
        <div class="stars">${stars(a.credibilityScore)}</div>
        <button class="btn-script" onclick="event.stopPropagation();openScript('${a.id}')">📝 台本生成</button>
      </div>
    </div>
  `).join('');
}

function badgeIcon(b) { return b==='red'?'🔴':b==='yellow'?'🟡':'🟢'; }
function stars(n) {
  let s='';
  for(let i=1;i<=5;i++) s+=`<span class="${i<=n?'star':'star-e'}">★</span>`;
  return s;
}

// ===== ARTICLE MODAL =====
function openArticle(id) {
  const a = articles.find(x=>x.id===id);
  if (!a) return;
  const srcs = [...(a.primarySources||[]).map(s=>`<div class="modal-source"><span class="modal-dot"></span><span>【一次資料】<a href="${s.url}" target="_blank" class="modal-link" rel="noopener">${s.title}</a></span></div>`),
    ...(a.japanSources||[]).map(s=>`<div class="modal-source"><span class="modal-dot" style="background:var(--yellow)"></span><span>【${s.media}】<a href="${s.url}" target="_blank" class="modal-link" style="color:var(--yellow)" rel="noopener">${s.title}</a></span></div>`)].join('');
  document.getElementById('modalBody').innerHTML = `
    <span class="badge badge-${a.badge}">${badgeIcon(a.badge)} ${a.badgeLabel}</span>
    <div class="modal-title" style="margin-top:10px">${a.title}</div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;font-size:11px;color:var(--muted)">
      <span>${a.category}</span><span>${a.date}</span><div class="stars">${stars(a.credibilityScore)}</div>
    </div>
    <div class="modal-label">📋 概要</div>
    <div class="modal-summary">${a.summary}</div>
    <div class="modal-label">🌿 吉野の読み</div>
    <div class="modal-yoshino">${a.yoshinoReading}</div>
    <div class="modal-label">📚 出典・一次資料</div>
    <div class="modal-sources">${srcs||'<span style="font-size:11px;color:var(--muted)">出典なし</span>'}</div>
    <div class="modal-disclaimer">⚠️ 本記事は動画制作のための情報整理目的です。医療診断・治療の推奨ではありません。健康上の判断は医師・専門家にご相談ください。</div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

// ===== SCRIPT MODAL =====
function openScript(id) {
  const a = articles.find(x=>x.id===id);
  if (!a) return;
  const script = `【${a.title}】台本構成案（30分尺）

■ データ・事実の提示（2:00〜10:00）

・数字・統計・研究結果の提示
・図解・グラフのナレーション

■ 吉野の読み（10:00〜22:00）
・${a.yoshinoReading}
・東洋医学・漢方医学の視点との接続

■ 視聴者が今できること（22:00〜28:00）

⚠️ 注意：医師法・景品表示法に配慮し、断定的な健康効果の主張は避けること。`;

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-title">📝 台本構成：${a.title.substring(0,30)}…</div>
    <div class="script-modal">${script}</div>
    <button onclick="navigator.clipboard.writeText(document.querySelector('.script-modal').textContent).then(()=>showToast('✅ コピーしました'))"
      style="margin-top:10px;background:var(--green-dim);color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:12px;cursor:pointer;width:100%">
      📋 クリップボードにコピー
    </button>
  `;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
}
function closeModalOnBg(e) {
  if (e.target===document.getElementById('modalOverlay')) closeModal();
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ===== HISTORY =====

function renderSeries() {

function selectSeries(sid) {

  document.getElementById('sc-'+sid).classList.add('active');
  const s = histSeries.find(x=>x.id===sid);

// ===== UPDATE =====
async function triggerUpdate() {
  const btn = document.getElementById('btnUpdate');
  btn.classList.add('loading');
  btn.textContent = '⟳ 更新中...';
  try {
    const res = await fetch('/api/refresh', {method:'POST'});
    if (res.ok) {
      const data = await res.json();
      if (data.articles) {
        articles = data.articles;
        renderArticles();
        showToast('✅ 題材を更新しました（合計'+articles.length+'件）');
      } else {
        showToast('✅ 更新リクエストを送信しました');
      }
    } else {
      showToast('⏳ しばらく待ってから再試行してください');
    }
  } catch(e) {
    showToast('📡 更新リクエストを送信しました。数分後に反映されます');
  }
  btn.classList.remove('loading');
  btn.textContent = '🔄 題材更新';
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}
